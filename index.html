<!DOCTYPE html>
<html>
<head>
    <title>NavRakhshak | Universal Control Panel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon-blue: #00f2ff; --bg-dark: #0f0f0f; --panel-bg: #1c2833; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Layout Structure */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 1; border: 2px solid #34495e; margin: 10px; border-radius: 10px; }
        
        /* Sidebar Styles */
        .sidebar { width: 320px; background: var(--panel-bg); padding: 20px; display: flex; flex-direction: column; gap: 15px; border-left: 2px solid var(--neon-blue); }
        .header { padding: 10px 20px; border-bottom: 2px solid var(--neon-blue); display: flex; justify-content: space-between; align-items: center; }
        
        /* Control Panel Elements */
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: var(--neon-blue); text-transform: uppercase; font-weight: bold; }
        input { background: #0b1218; border: 1px solid #34495e; color: white; padding: 10px; border-radius: 5px; outline: none; }
        input:focus { border-color: var(--neon-blue); }
        
        .btn-sync { 
            background: var(--neon-blue); color: #000; border: none; padding: 15px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-sync:hover { background: #fff; box-shadow: 0 0 15px var(--neon-blue); }

        /* Existing Badges */
        .badge { padding: 10px; border-radius: 5px; font-weight: bold; text-align: center; font-size: 13px; }
        #status { background: #27ae60; }
        .alert-flash { animation: blinker 0.6s linear infinite; background: #ff0000 !important; }
        @keyframes blinker { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">NAVRAKHSHAK <span style="font-size: 14px; opacity: 0.7;">V2.0 UNIVERSAL</span></h2>
        <div id="status" class="badge">VESSEL SECURE</div>
    </div>

    <div class="main-container">
        <div id="map"></div>

        <div class="sidebar">
            <h3 style="color: var(--neon-blue); margin-top: 0;">Geo-Fence Control</h3>
            <p style="font-size: 11px; color: #888;">Click on map to pick center point</p>
            
            <div class="input-group">
                <label>Center Latitude</label>
                <input type="number" id="inp-lat" step="0.000001" placeholder="22.959600">
            </div>
            
            <div class="input-group">
                <label>Center Longitude</label>
                <input type="number" id="inp-lon" step="0.000001" placeholder="88.447600">
            </div>

            <div class="input-group">
                <label>Radius (Meters)</label>
                <input type="number" id="inp-rad" value="15">
            </div>

            <div class="input-group">
                <label>Safety Buffer (Meters)</label>
                <input type="number" id="inp-buf" value="5">
            </div>

            <button class="btn-sync" onclick="syncToBoat()">Update & Sync to Boat</button>
            
            <div id="sync-log" style="font-size: 12px; color: #aaa; margin-top: 10px;">
                Last Sync: Never
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- CONFIGURATION ---
        const channelID = "3300600";
        const readKey = "M8RQ5ECSRWHF5ZRE";
        const talkBackID = "YOUR_TALKBACK_ID"; // Get this from ThingSpeak -> Apps -> TalkBack
        const talkBackKey = "YOUR_TALKBACK_API_KEY";

        var map = L.map('map').setView([22.9596, 88.4476], 19);
        L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        var boatIcon = L.circleMarker([0, 0], { radius: 8, color: '#fff', fillColor: '#007bff', fillOpacity: 1 }).addTo(map);
        var fenceCircle = L.circle([22.9596, 88.4476], { color: '#00f2ff', weight: 2, fillColor: '#00f2ff', fillOpacity: 0.1 }).addTo(map);

        // Map Click Interaction
        map.on('click', function(e) {
            document.getElementById('inp-lat').value = e.latlng.lat.toFixed(6);
            document.getElementById('inp-lon').value = e.latlng.lng.toFixed(6);
            fenceCircle.setLatLng(e.latlng);
        });

        // Function to send data to ThingSpeak TalkBack
        async function syncToBoat() {
            const lat = document.getElementById('inp-lat').value;
            const lon = document.getElementById('inp-lon').value;
            const rad = document.getElementById('inp-rad').value;
            const buf = document.getElementById('inp-buf').value;

            if(!lat || !lon) { alert("Please select a location on map!"); return; }

            const command = `SET:${lat},${lon},${rad},${buf}`;
            
            // ThingSpeak TalkBack API Call
            const url = `https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json?api_key=${talkBackKey}&command_string=${command}`;
            
            try {
                const res = await fetch(url, { method: 'POST' });
                if(res.ok) {
                    document.getElementById('sync-log').innerHTML = `Last Sync: ${new Date().toLocaleTimeString()} (Command Sent)`;
                    fenceCircle.setRadius(rad);
                    alert("Sync Command Sent! Gateway will broadcast via LoRa.");
                }
            } catch (e) { alert("Sync Failed. Check internet connection."); }
        }

        // Standard Live Location Logic
        async function updateLiveLocation() {
            try {
                const response = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
                const data = await response.json();
                const feed = data.feeds[0];
                if (feed) {
                    const lat = parseFloat(feed.field1);
                    const lon = parseFloat(feed.field2);
                    boatIcon.setLatLng([lat, lon]);
                }
            } catch (error) { console.log("Updating..."); }
        }

        setInterval(updateLiveLocation, 15000);
        updateLiveLocation();
    </script>
</body>
</html>
