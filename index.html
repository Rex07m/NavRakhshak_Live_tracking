<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVRAKHSHAK | Maritime Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap');

        :root {
            /* Light Theme (Default) */
            --bg-deep: #f0f2f5;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --text-color: #1a1c1e;
            --accent: #0066ff;
            --danger: #ff3e3e;
            --border: rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-deep: #0a0c10;
                --panel-bg: rgba(13, 17, 23, 0.9);
                --text-color: #e6edf3;
                --accent: #d4ff00; /* Neon Lime for Dark Mode */
                --border: rgba(255,255,255,0.1);
            }
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Space Grotesk', sans-serif; background: var(--bg-deep); color: var(--text-color); overflow: hidden; }

        .app-shell { display: flex; height: 100vh; width: 100vw; }

        /* HUD SIDEBAR */
        aside {
            width: 280px; background: var(--panel-bg); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            padding: 40px 30px; gap: 40px; z-index: 2000; flex-shrink: 0;
        }

        .brand-logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 3px; color: var(--accent); }
        
        .nav-group { display: flex; flex-direction: column; gap: 10px; }
        .nav-btn {
            background: none; border: none; color: var(--text-color); font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px; text-align: left; cursor: pointer;
            padding: 12px 15px; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 15px;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--accent); color: #000; }

        /* VIEWPORT */
        .viewport { flex-grow: 1; position: relative; height: 100%; background: #ccc; }
        #map { height: 100%; width: 100%; z-index: 1; }

        .page { 
            position: absolute; inset: 0; display: none; padding: 40px; 
            z-index: 100; pointer-events: none; justify-content: center; align-items: center;
        }
        .page.active { display: flex; }

        .tech-panel {
            background: var(--panel-bg); border: 1px solid var(--border);
            padding: 35px; border-radius: 20px; width: 100%; max-width: 420px;
            backdrop-filter: blur(25px); pointer-events: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .title-panel { font-family: 'Syncopate', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 15px; }

        input {
            width: 100%; background: rgba(128,128,128,0.1); border: 1px solid var(--border);
            padding: 12px; color: var(--text-color); border-radius: 8px; font-family: monospace; margin-bottom: 15px; box-sizing: border-box;
        }

        .action-btn {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .action-btn:disabled { background: #555; color: #888; cursor: not-allowed; }

        /* HUD OVERLAYS */
        .hud-tag {
            position: absolute; top: 30px; right: 30px; background: var(--panel-bg);
            padding: 10px 20px; border-radius: 50px; font-size: 10px; font-weight: 800; z-index: 1000; border: 1px solid var(--border);
        }
        .pos-overlay {
            position: absolute; bottom: 30px; left: 30px; background: var(--panel-bg);
            padding: 15px 20px; border-radius: 12px; z-index: 1000; border-left: 4px solid var(--accent);
        }

        .danger-pulse { background: var(--danger) !important; color: white !important; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="app-shell">
    <aside>
        <div class="brand-zone">
            <div class="brand-logo">NAVRAKHSHAK</div>
            <div style="font-size: 9px; opacity: 0.5; letter-spacing: 1px;">ADAPTIVE MARITIME INTEL</div>
        </div>

        <nav class="nav-group">
            <button class="nav-btn active" onclick="showPage('mapPage', this)"><i class="fa-solid fa-crosshairs"></i> Surveillance</button>
            <button class="nav-btn" onclick="showPage('adminPage', this)"><i class="fa-solid fa-terminal"></i> Command Center</button>
            <button class="nav-btn" id="sosNavBtn" onclick="acknowledgeSOS()"><i class="fa-solid fa-satellite-dish"></i> Rescue Ack</button>
        </nav>

        <div style="margin-top: auto; font-size: 9px; opacity: 0.4; line-height: 1.8;">
            CORE: JIS-ECE-07<br>MODE: ADAPTIVE UI<br>STATUS: ENCRYPTED
        </div>
    </aside>

    <div class="viewport">
        <div id="map"></div>
        <div class="hud-tag" id="statusBadge">LINK: STANDBY</div>

        <div class="pos-overlay">
            <div style="font-size: 9px; opacity: 0.6; margin-bottom: 4px;">UNIT_01 POSITION</div>
            <div id="boatCoords" style="font-size: 16px; font-weight: 800; font-family: monospace;">FETCHING...</div>
            <div id="syncTime" style="font-size: 9px; opacity: 0.6; margin-top: 4px;">--:--:--</div>
        </div>

        <section id="adminPage" class="page">
            <div class="tech-panel">
                <div class="title-panel">COMMAND</div>
                
                <label style="font-size: 10px; opacity: 0.6;">NEW BOUNDARY COORDINATES</label>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <input type="number" id="cmdLat" step="0.000001" placeholder="Latitude">
                    <input type="number" id="cmdLon" step="0.000001" placeholder="Longitude">
                </div>
                
                <div style="display:flex; gap:10px;">
                    <input type="number" id="cmdRad" placeholder="Radius (m)">
                    <input type="number" id="cmdBuf" placeholder="Buffer (m)">
                </div>

                <button id="syncBtn" class="action-btn" onclick="updateGeofence()" disabled>DISPATCH ZONE</button>

                <div style="margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px;">
                    <label style="font-size: 10px; opacity: 0.6;">MASTER AUTHORIZATION</label>
                    <input type="password" id="adminPin" placeholder="Enter PIN" maxlength="4" oninput="checkAuth()">
                    <div style="display:flex; justify-content: space-between;">
                        <button onclick="clearPath()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:10px; font-weight:700;">PURGE PATHS</button>
                        <button onclick="openSettingsModal()" style="background:none; border:none; color:var(--text-color); opacity:0.5; cursor:pointer; font-size:10px;">RESET PIN</button>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<div id="settingsModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9000; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
    <div class="tech-panel">
        <h3 style="font-family:'Syncopate';">RE-KEY SYSTEM</h3>
        <input type="password" id="oldPin" placeholder="Verify Current Key">
        <input type="password" id="newPin" placeholder="New 4-Digit Key" maxlength="4">
        <button class="action-btn" onclick="saveNewPin()">APPLY KEY</button>
        <button onclick="closeSettings()" style="background:none; border:none; color:white; width:100%; margin-top:10px; cursor:pointer;">CANCEL</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const chID = "3300600", rKey = "M8RQ5ECSRWHF5ZRE", tbID = "56620", tbKey = "6H22BCX9X5LZ8II6";
    if (!localStorage.getItem('navPin')) localStorage.setItem('navPin', '1234');

    function showPage(pID, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(pID !== 'mapPage') document.getElementById(pID).classList.add('active');
        btn.classList.add('active');
        // Force the map to fill the container after switching back
        if(pID === 'mapPage') {
            setTimeout(() => { map.invalidateSize(); }, 200);
        }
    }

    // TOPOGRAPHICAL MAP INITIALIZATION
    var map = L.map('map', {zoomControl: false}).setView([23.13161, 88.54735], 16);
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        maxZoom: 17,
        attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap'
    }).addTo(map);

    var boatPath = L.polyline([], {color: '#ff9900', weight: 3, opacity: 0.7}).addTo(map);
    var boatIcon = L.circleMarker([0,0], { radius: 10, color: '#000', fillColor: '#d4ff00', fillOpacity: 1, weight: 3 }).addTo(map);
    var visualFence = L.circle([23.13161, 88.54735], { radius: 50, color: 'red', weight: 2, fillOpacity: 0.1 }).addTo(map);

    function checkAuth() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        document.getElementById('syncBtn').disabled = !isAuth;
    }

    async function updateData() {
        try {
            const res = await fetch(`https://api.thingspeak.com/channels/${chID}/feeds.json?api_key=${rKey}&results=1`);
            const data = await res.json();
            const feed = data.feeds[0];
            if (feed) {
                const lat = parseFloat(feed.field1), lon = parseFloat(feed.field2), statusMsg = String(feed.field3 || "").toUpperCase();
                if (!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                    boatIcon.setLatLng([lat, lon]); boatPath.addLatLng([lat, lon]);
                    document.getElementById('boatCoords').innerText = `${lat.toFixed(6)} , ${lon.toFixed(6)}`;
                }
                document.getElementById('syncTime').innerText = new Date(feed.created_at).toLocaleTimeString();
                
                let badge = document.getElementById('statusBadge'), sosBtn = document.getElementById('sosNavBtn');
                if (statusMsg.includes("SOS")) {
                    badge.innerText = "ALARM: DISTRESS SIGNAL"; badge.classList.add('danger-pulse');
                    sosBtn.classList.add('danger-pulse');
                } else {
                    badge.innerText = "LINK: SECURE / LIVE"; badge.classList.remove('danger-pulse');
                    sosBtn.classList.remove('danger-pulse');
                }
            }
        } catch (e) {}
    }

    async function updateGeofence() {
        const lat = document.getElementById('cmdLat').value, lon = document.getElementById('cmdLon').value, rad = document.getElementById('cmdRad').value, buf = document.getElementById('cmdBuf').value;
        const params = new URLSearchParams(); params.append('api_key', tbKey); params.append('command_string', `SET:${lat},${lon},${rad},${buf}`);
        const res = await fetch(`https://api.thingspeak.com/talkbacks/${tbID}/commands.json`, { method: 'POST', body: params });
        if(res.ok) {
            visualFence.setLatLng([lat, lon]); visualFence.setRadius(parseFloat(rad));
            alert("BOUNDARY DISPATCHED.");
        }
    }

    async function acknowledgeSOS() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        if(!isAuth) return alert("AUTH REQUIRED: Enter PIN in Command Center.");
        const params = new URLSearchParams(); params.append('api_key', tbKey); params.append('command_string', "ACK_SOS");
        await fetch(`https://api.thingspeak.com/talkbacks/${tbID}/commands.json`, { method: 'POST', body: params });
        alert("RESCUE ACK BROADCASTED.");
    }

    function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveNewPin() {
        if(document.getElementById('oldPin').value === localStorage.getItem('navPin')) {
            localStorage.setItem('navPin', document.getElementById('newPin').value); alert("KEY UPDATED."); closeSettings();
        }
    }
    function clearPath() { boatPath.setLatLngs([]); alert("MAP PURGED."); }

    setInterval(updateData, 15000); updateData();
</script>
</body>
</html>
