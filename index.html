<!DOCTYPE html>
<html>
<head>
    <title>NavRakhshak | Secure Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 60vh; width: 100%; border-radius: 10px; border: 2px solid #34495e; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #00f2ff; padding-bottom: 10px; flex-wrap: wrap; }
        
        .badge { 
            padding: 12px 20px; border-radius: 5px; font-weight: bold; text-transform: uppercase; 
            font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center;
            min-width: 180px; text-align: center;
        }

        #status { background: #1c2833; border: 1px solid #34495e; }
        
        .control-panel { 
            background: #1c2833; padding: 15px; border-radius: 10px; margin-top: 15px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px;
            border: 1px solid #00f2ff;
        }
        .control-panel label { font-size: 11px; color: #00f2ff; font-weight: bold; }
        .control-panel input { 
            background: #0f0f0f; border: 1px solid #34495e; color: #fff; 
            padding: 8px; border-radius: 5px; width: 85%;
        }
        .btn {
            border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #000;
        }
        .btn-sync { background: #00f2ff; }
        .btn-sos { background: #ff4757; color: white; display: none; }
        .btn-clear { background: #747d8c; color: white; margin-top: 5px; font-size: 10px; padding: 5px 10px; }
        
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
        
        .alert-flash { animation: blinker 0.6s linear infinite; background: #ff0000 !important; color: white !important; }
        @keyframes blinker { 50% { opacity: 0.4; } }
        
        .footer-info { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: #888; }
        .coord-display { font-family: monospace; color: #00f2ff; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>NAVRAKHSHAK <span style="color: #00f2ff; font-size: 14px;">MARITIME GATEWAY</span></h1>
        <div style="display: flex; gap: 10px;">
            <div id="status" class="badge">INITIALIZING...</div>
            <button id="sosFeedbackBtn" class="badge btn-sos" onclick="acknowledgeSOS()">ACKNOWLEDGE SOS</button>
        </div>
    </div>
    
    <div id="map"></div>
    <button class="btn btn-clear" onclick="clearPath()">CLEAR PATH HISTORY</button>
    <div id="boatCoords" class="coord-display">Boat Position: Lat --, Lon --</div>

    <div class="control-panel">
        <div>
            <label>Fence Center Lat:</label>
            <input type="number" id="cmdLat" step="0.000001" placeholder="Lat">
        </div>
        <div>
            <label>Fence Center Lon:</label>
            <input type="number" id="cmdLon" step="0.000001" placeholder="Lon">
        </div>
        <div>
            <label>Total Radius (m):</label>
            <input type="number" id="cmdRad" placeholder="Radius">
        </div>
        <div>
            <label>Safety Buffer (m):</label>
            <input type="number" id="cmdBuf" placeholder="Buffer">
        </div>
        <div style="display:flex; align-items: flex-end;">
            <button class="btn btn-sync" onclick="updateGeofence()">SYNC BOUNDARY</button>
        </div>
    </div>

    <div class="footer-info">
        <span id="last-sync">Last Data Sync: --:--:--</span>
        <span id="cmd-status">Command Status: Idle</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const channelID = "3300600"; 
        const readKey = "M8RQ5ECSRWHF5ZRE";
        const talkBackID = "56620"; 
        const talkBackKey = "6H22BCX9X5LZ8II6";

        // 1. Initialize Map centered on last known boat location
        var map = L.map('map').setView([23.13161, 88.54735], 18);
        L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        var boatPath = L.polyline([], {color: '#f1c40f', weight: 3}).addTo(map);
        var boatIcon = L.circleMarker([23.13161, 88.54735], { radius: 8, color: '#fff', fillColor: '#007bff', fillOpacity: 1 }).addTo(map);
        
        // 2. Setup Circles with initial default values so they aren't invisible
        var visualFence = L.circle([23.13161, 88.54735], { radius: 50, color: '#ff0000', weight: 2, fillOpacity: 0.1 }).addTo(map);
        var safetyRing = L.circle([23.13161, 88.54735], { radius: 43, color: '#00f2ff', weight: 1, dashArray: '5, 10', fillOpacity: 0 }).addTo(map);

        async function fetchCurrentSettings() {
            try {
                const res = await fetch(`https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json?api_key=${talkBackKey}&results=1`);
                const data = await res.json();
                if (data && data.length > 0) {
                    const cmd = data[0].command_string;
                    if(cmd && cmd.startsWith("SET:")) {
                        const parts = cmd.replace("SET:", "").split(",");
                        document.getElementById('cmdLat').value = parts[0];
                        document.getElementById('cmdLon').value = parts[1];
                        document.getElementById('cmdRad').value = parts[2];
                        document.getElementById('cmdBuf').value = parts[3];
                        updateMapVisuals(parts[0], parts[1], parts[2], parts[3]);
                    }
                }
            } catch (e) { console.error("Setting fetch error:", e); }
        }

        function updateMapVisuals(lat, lon, rad, buf) {
            const center = [parseFloat(lat), parseFloat(lon)];
            visualFence.setLatLng(center);
            visualFence.setRadius(parseFloat(rad));
            safetyRing.setLatLng(center);
            safetyRing.setRadius(parseFloat(rad) - parseFloat(buf));
            map.panTo(center);
        }

        async function updateData() {
            try {
                const response = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
                const data = await response.json();
                const feed = data.feeds[0];

                if (feed) {
                    const lat = parseFloat(feed.field1);
                    const lon = parseFloat(feed.field2);
                    const statusMsg = String(feed.field3 || "").toUpperCase(); // Convert to uppercase for safer matching
                    
                    if (!isNaN(lat) && !isNaN(lon)) {
                        boatIcon.setLatLng([lat, lon]);
                        boatPath.addLatLng([lat, lon]);
                        document.getElementById('boatCoords').innerText = `Boat Position: Lat ${lat.toFixed(6)}, Lon ${lon.toFixed(6)}`;
                    }
                    
                    document.getElementById('last-sync').innerText = `Last Data Sync: ${new Date(feed.created_at).toLocaleTimeString()}`;
                    
                    let statusDiv = document.getElementById('status');
                    let sosBtn = document.getElementById('sosFeedbackBtn');

                    // 3. Robust SOS/Alert Detection
                    if (statusMsg.includes("SOS")) {
                        statusDiv.className = "badge alert-flash";
                        statusDiv.innerHTML = "!!! SOS RECEIVED !!!";
                        sosBtn.style.display = "flex"; 
                    } else if (statusMsg.includes("ALERT")) {
                        statusDiv.className = "badge alert-flash";
                        statusDiv.innerHTML = "BOUNDARY BREACH";
                        sosBtn.style.display = "none";
                    } else {
                        statusDiv.className = "badge";
                        statusDiv.style.background = "#27ae60";
                        statusDiv.innerHTML = "BOAT SAFE";
                        sosBtn.style.display = "none";
                    }
                }
            } catch (e) { console.error("Data update error:", e); }
        }

        async function updateGeofence() {
            const lat = document.getElementById('cmdLat').value;
            const lon = document.getElementById('cmdLon').value;
            const rad = document.getElementById('cmdRad').value;
            const buf = document.getElementById('cmdBuf').value;
            if(!lat || !lon || !rad || !buf) return alert("Please fill all fields");
            
            const commandString = `SET:${lat},${lon},${rad},${buf}`;
            sendCommand(commandString, "Boundary Synced");
            updateMapVisuals(lat, lon, rad, buf);
        }

        async function acknowledgeSOS() {
            sendCommand("ACK_SOS", "SOS Acknowledged - Signal Sent to Boat");
            alert("Acknowledgement Sent! Boat will receive confirmation soon.");
        }

        async function sendCommand(cmdStr, successMsg) {
            document.getElementById('cmd-status').innerText = "Sending...";
            const url = `https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`;
            const params = new URLSearchParams();
            params.append('api_key', talkBackKey);
            params.append('command_string', cmdStr);
            try {
                const res = await fetch(url, { method: 'POST', body: params });
                if(res.ok) document.getElementById('cmd-status').innerText = "Status: " + successMsg;
            } catch(e) { document.getElementById('cmd-status').innerText = "Status: Error"; }
        }

        function clearPath() {
            boatPath.setLatLngs([]);
        }

        // Initialize everything
        fetchCurrentSettings();
        setInterval(updateData, 15000);
        updateData();
    </script>
</body>
</html>
