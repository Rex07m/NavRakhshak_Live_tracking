<!DOCTYPE html>
<html>
<head>
    <title>NavRakhshak | Secure Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 60vh; width: 100%; border-radius: 10px; border: 2px solid #34495e; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #00f2ff; padding-bottom: 10px; flex-wrap: wrap; }
        
        .badge { 
            padding: 12px 20px; border-radius: 5px; font-weight: bold; text-transform: uppercase; 
            font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center;
            min-width: 180px; text-align: center;
        }

        #status { background: #1c2833; border: 1px solid #34495e; }
        
        .control-panel { 
            background: #1c2833; padding: 15px; border-radius: 10px; margin-top: 15px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px;
            border: 1px solid #00f2ff;
        }
        .control-panel label { font-size: 11px; color: #00f2ff; font-weight: bold; }
        .control-panel input { 
            background: #0f0f0f; border: 1px solid #34495e; color: #fff; 
            padding: 8px; border-radius: 5px; width: 85%;
        }
        .btn { border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #000; }
        .btn:disabled { background: #555 !important; cursor: not-allowed; color: #888; }
        .btn-sync { background: #00f2ff; }
        .btn-sos { background: #ff4757; color: white; display: none; }
        .btn-clear { background: #747d8c; color: white; margin-top: 5px; font-size: 10px; padding: 5px 10px; }
        .btn-settings { background: #f1c40f; font-size: 10px; padding: 5px 10px; margin-left: 10px; }
        
        .btn:hover:not(:disabled) { opacity: 0.8; transform: scale(1.02); }
        .alert-flash { animation: blinker 0.6s linear infinite; background: #ff0000 !important; color: white !important; box-shadow: 0 0 15px #ff0000; }
        @keyframes blinker { 50% { opacity: 0.4; } }
        
        .footer-info { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: #888; }
        .coord-display { font-family: monospace; color: #00f2ff; font-size: 14px; margin-top: 5px; font-weight: bold; }

        .auth-box { background: #2c3e50; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 5px solid #f1c40f; display: flex; align-items: center; }
        .auth-box input { background: #000; border: 1px solid #f1c40f; color: #f1c40f; padding: 5px; border-radius: 3px; width: 80px; margin: 0 10px; }
        
        /* Modal UI */
        #settingsModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #1c2833; margin: 15% auto; padding: 20px; border: 1px solid #00f2ff; width: 300px; border-radius: 10px; }
        .modal-content input { width: 90%; margin-bottom: 10px; padding: 8px; background: #000; color: #fff; border: 1px solid #34495e; }
    </style>
</head>
<body>
    <div class="header">
        <h1>NAVRAKHSHAK <span style="color: #00f2ff; font-size: 14px;">MARITIME GATEWAY</span></h1>
        <div style="display: flex; gap: 10px;">
            <div id="status" class="badge">INITIALIZING...</div>
            <button id="sosFeedbackBtn" class="badge btn-sos" onclick="acknowledgeSOS()">ACKNOWLEDGE SOS</button>
        </div>
    </div>
    
    <div id="map"></div>
    <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 5px;">
        <div>
            <button class="btn btn-clear" onclick="clearPath()">CLEAR PATH</button>
            <button class="btn btn-settings" onclick="openSettings()">CHANGE PIN</button>
        </div>
        
        <div class="auth-box">
            <label style="font-size: 10px; color: #f1c40f;">ADMIN PIN:</label>
            <input type="password" id="adminPin" placeholder="****" oninput="checkAuth()">
            <a href="#" onclick="forgotPin()" style="font-size: 9px; color: #888; text-decoration: none;">Forgot?</a>
        </div>
    </div>
    
    <div id="boatCoords" class="coord-display">Boat Position: Lat --, Lon --</div>

    <div class="control-panel">
        <div><label>Fence Center Lat:</label><input type="number" id="cmdLat" step="0.000001"></div>
        <div><label>Fence Center Lon:</label><input type="number" id="cmdLon" step="0.000001"></div>
        <div><label>Total Radius (m):</label><input type="number" id="cmdRad"></div>
        <div><label>Safety Buffer (m):</label><input type="number" id="cmdBuf"></div>
        <div style="display:flex; align-items: flex-end;">
            <button id="syncBtn" class="btn btn-sync" onclick="updateGeofence()" disabled>SYNC BOUNDARY</button>
        </div>
    </div>

    <div id="settingsModal">
        <div class="modal-content">
            <h3>Update Security PIN</h3>
            <label style="font-size: 12px;">Current PIN:</label>
            <input type="password" id="oldPin">
            <label style="font-size: 12px;">New 4-Digit PIN:</label>
            <input type="password" id="newPin" maxlength="4">
            <button class="btn btn-sync" style="width: 100%" onclick="saveNewPin()">SAVE CHANGES</button>
            <button class="btn btn-clear" style="width: 100%; margin-top: 10px;" onclick="closeSettings()">CANCEL</button>
        </div>
    </div>

    <div class="footer-info">
        <span id="last-sync">Last Data Sync: --:--:--</span>
        <span id="cmd-status">Command Status: Locked</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const channelID = "3300600"; 
        const readKey = "M8RQ5ECSRWHF5ZRE";
        const talkBackID = "56620"; 
        const talkBackKey = "6H22BCX9X5LZ8II6";

        // Initialize PIN from LocalStorage or use default
        if (!localStorage.getItem('navPin')) localStorage.setItem('navPin', '1234');

        var map = L.map('map').setView([23.13161, 88.54735], 18);
        L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

        var boatPath = L.polyline([], {color: '#f1c40f', weight: 3}).addTo(map);
        var boatIcon = L.circleMarker([23.13161, 88.54735], { radius: 8, color: '#fff', fillColor: '#007bff', fillOpacity: 1 }).addTo(map);
        var visualFence = L.circle([23.13161, 88.54735], { radius: 50, color: '#ff0000', weight: 2, fillOpacity: 0.1 }).addTo(map);
        var safetyRing = L.circle([23.13161, 88.54735], { radius: 43, color: '#00f2ff', weight: 1, dashArray: '5, 10', fillOpacity: 0 }).addTo(map);

        function checkAuth() {
            const entered = document.getElementById('adminPin').value;
            const current = localStorage.getItem('navPin');
            const syncBtn = document.getElementById('syncBtn');
            const sosBtn = document.getElementById('sosFeedbackBtn');
            const cmdStatus = document.getElementById('cmd-status');

            if(entered === current) {
                syncBtn.disabled = false;
                sosBtn.disabled = false;
                cmdStatus.innerText = "Status: Authenticated";
                cmdStatus.style.color = "#00f2ff";
            } else {
                syncBtn.disabled = true;
                sosBtn.disabled = true;
                cmdStatus.innerText = "Status: Locked";
                cmdStatus.style.color = "#888";
            }
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'block'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        function saveNewPin() {
            const old = document.getElementById('oldPin').value;
            const next = document.getElementById('newPin').value;
            if(old === localStorage.getItem('navPin') && next.length === 4) {
                localStorage.setItem('navPin', next);
                alert("PIN Changed Successfully!");
                closeSettings();
                location.reload();
            } else {
                alert("Verification failed. Check current PIN.");
            }
        }

        function forgotPin() {
            // Security Question Fail-safe
            const ans = prompt("SECURITY RESET: What is the boat's project name?");
            if(ans && ans.toLowerCase() === "navrakhshak") {
                localStorage.setItem('navPin', '1234');
                alert("PIN has been reset to default: 1234");
                location.reload();
            } else {
                alert("Incorrect answer.");
            }
        }

        // --- Keep previous logic functions ---
        async function fetchCurrentSettings() {
            try {
                const res = await fetch(`https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json?api_key=${talkBackKey}&results=1`);
                const data = await res.json();
                if (data && data.length > 0) {
                    const cmd = data[0].command_string;
                    if(cmd.startsWith("SET:")) {
                        const parts = cmd.replace("SET:", "").split(",");
                        document.getElementById('cmdLat').value = parts[0];
                        document.getElementById('cmdLon').value = parts[1];
                        document.getElementById('cmdRad').value = parts[2];
                        document.getElementById('cmdBuf').value = parts[3];
                        updateMapVisuals(parts[0], parts[1], parts[2], parts[3]);
                    }
                }
            } catch (e) {}
        }

        function updateMapVisuals(lat, lon, rad, buf) {
            const center = [parseFloat(lat), parseFloat(lon)];
            visualFence.setLatLng(center); visualFence.setRadius(parseFloat(rad));
            safetyRing.setLatLng(center); safetyRing.setRadius(parseFloat(rad) - parseFloat(buf));
            map.panTo(center);
        }

        async function updateData() {
            try {
                const response = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
                const data = await response.json();
                const feed = data.feeds[0];
                if (feed) {
                    const lat = parseFloat(feed.field1); const lon = parseFloat(feed.field2);
                    const statusMsg = String(feed.field3 || "").toUpperCase().trim();
                    if (!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                        boatIcon.setLatLng([lat, lon]); boatPath.addLatLng([lat, lon]);
                        document.getElementById('boatCoords').innerText = `Boat Position: Lat ${lat.toFixed(6)}, Lon ${lon.toFixed(6)}`;
                    }
                    document.getElementById('last-sync').innerText = `Sync: ${new Date(feed.created_at).toLocaleTimeString()}`;
                    let statusDiv = document.getElementById('status');
                    let sosBtn = document.getElementById('sosFeedbackBtn');
                    if (statusMsg.includes("SOS")) {
                        statusDiv.className = "badge alert-flash"; statusDiv.innerHTML = "!!! SOS RECEIVED !!!";
                        sosBtn.style.display = "flex";
                    } else if (statusMsg.includes("ALERT")) {
                        statusDiv.className = "badge alert-flash"; statusDiv.innerHTML = "BOUNDARY ALERT";
                        sosBtn.style.display = "none";
                    } else {
                        statusDiv.className = "badge"; statusDiv.style.background = "#27ae60";
                        statusDiv.innerHTML = "BOAT SAFE"; sosBtn.style.display = "none";
                    }
                }
            } catch (e) {}
        }

        async function updateGeofence() {
            const lat = document.getElementById('cmdLat').value;
            const lon = document.getElementById('cmdLon').value;
            const rad = document.getElementById('cmdRad').value;
            const buf = document.getElementById('cmdBuf').value;
            sendCommand(`SET:${lat},${lon},${rad},${buf}`, "Boundary Synced");
            updateMapVisuals(lat, lon, rad, buf);
        }

        async function acknowledgeSOS() { sendCommand("ACK_SOS", "SOS Acknowledged"); alert("Acknowledgement Sent!"); }

        async function sendCommand(cmdStr, successMsg) {
            document.getElementById('cmd-status').innerText = "Sending...";
            const url = `https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`;
            const params = new URLSearchParams();
            params.append('api_key', talkBackKey); params.append('command_string', cmdStr);
            try {
                const res = await fetch(url, { method: 'POST', body: params });
                if(res.ok) document.getElementById('cmd-status').innerText = "Status: " + successMsg;
            } catch(e) { document.getElementById('cmd-status').innerText = "Status: Error"; }
        }

        function clearPath() { boatPath.setLatLngs([]); }
        fetchCurrentSettings(); setInterval(updateData, 15000); updateData();
    </script>
</body>
</html>
