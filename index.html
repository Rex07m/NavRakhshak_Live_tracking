<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVRAKHSHAK | Maritime Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --bg-primary: #f4f4f2;
            --bg-dark: #121212;
            --accent: #d4ff00;
            --danger: #ff3e3e;
            --text-dark: #1a1a1a;
            --border: rgba(0,0,0,0.1);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-dark); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* NAV BAR */
        nav { 
            width: 80px; background: var(--bg-dark); display: flex; flex-direction: column; 
            align-items: center; padding: 20px 0; gap: 30px; z-index: 2000; flex-shrink: 0;
        }
        .nav-item { 
            color: #555; font-size: 20px; cursor: pointer; transition: 0.3s; 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px;
        }
        .nav-item:hover, .nav-item.active { color: var(--accent); background: rgba(212, 255, 0, 0.1); }
        .nav-item.danger-active { color: var(--danger); animation: pulse-red 1s infinite; }

        /* PAGES */
        .page { display: none; flex-grow: 1; height: 100%; position: relative; overflow-y: auto; padding: 40px; box-sizing: border-box; }
        .page.active { display: flex; flex-direction: column; }
        #mapPage { padding: 0; } 

        #map { height: 100%; width: 100%; }

        .panel { 
            max-width: 600px; width: 100%; margin: auto; background: white; padding: 40px; 
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
            border: 1px solid var(--border); box-sizing: border-box;
        }
        .header-title { font-size: 42px; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; margin-bottom: 30px; line-height: 1; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #888; }
        input { 
            width: 100%; border: none; background: #f0f0f0; padding: 15px; border-radius: 12px; 
            font-size: 16px; font-weight: 600; box-sizing: border-box;
        }

        .btn { 
            padding: 20px; border-radius: 14px; border: none; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; width: 100%; margin-top: 15px; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-black { background: var(--bg-dark); color: white; }
        .btn-black:hover:not(:disabled) { background: #333; transform: scale(1.02); }
        .btn-black:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; color: #666; }

        /* OVERLAYS */
        .top-status {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: var(--bg-dark); color: white; padding: 10px 20px; border-radius: 40px;
            font-weight: 700; font-size: 11px; display: flex; align-items: center; gap: 10px;
        }

        .floating-pos {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: white; padding: 15px 20px; border-radius: 15px; border: 1px solid var(--border);
        }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 62, 62, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); } }
    </style>
</head>
<body>

<div class="app-container">
    <nav>
        <div class="nav-item active" onclick="showPage('mapPage', this)"><i class="fa-solid fa-map"></i></div>
        <div class="nav-item" onclick="showPage('boundaryPage', this)"><i class="fa-solid fa-arrows-to-dot"></i></div>
        <div id="sosNav" class="nav-item" onclick="acknowledgeSOS()"><i class="fa-solid fa-kit-medical"></i></div>
        <div class="nav-item" onclick="showPage('securityPage', this)" style="margin-top: auto;"><i class="fa-solid fa-lock" id="mainLockIcon"></i></div>
    </nav>

    <section id="mapPage" class="page active">
        <div class="top-status">
            <span id="statDot" style="width: 8px; height: 8px; border-radius: 50%; background: var(--accent);"></span>
            <span id="statusLabel">VESSEL SECURE</span>
            <span id="lastSyncTime" style="opacity: 0.4;">--:--</span>
        </div>
        <div id="map"></div>
        <div class="floating-pos">
            <label>Live Coordinates</label>
            <div id="boatCoords" style="font-size: 16px; font-weight: 900; font-family: monospace;">FETCHING...</div>
        </div>
    </section>

    <section id="boundaryPage" class="page">
        <div class="panel">
            <div class="header-title">BOUNDARY<br><span style="color:var(--accent); background:black; padding: 0 10px;">ENFORCEMENT</span></div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group"><label>Center Latitude</label><input type="number" id="cmdLat" step="0.000001" placeholder="23.1316"></div>
                <div class="input-group"><label>Center Longitude</label><input type="number" id="cmdLon" step="0.000001" placeholder="88.5473"></div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group"><label>Fence Radius (m)</label><input type="number" id="cmdRad" placeholder="50"></div>
                <div class="input-group"><label>Safety Buffer (m)</label><input type="number" id="cmdBuf" placeholder="7"></div>
            </div>

            <button id="syncBtn" class="btn btn-black" onclick="updateGeofence()" disabled>
                <i class="fa-solid fa-lock" id="lockIcon"></i>
                <span id="btnText">ACCESS DENIED: LOCKED</span>
            </button>
        </div>
    </section>

    <section id="securityPage" class="page">
        <div class="panel">
            <div class="header-title">SECURITY<br>TERMINAL</div>
            <div class="input-group">
                <label>Admin Master PIN</label>
                <input type="password" id="adminPin" placeholder="Type 1234 to Unlock" maxlength="4" oninput="checkAuth()">
            </div>
            <div id="authStatus" style="font-size: 12px; font-weight: 700; margin-bottom: 10px; color: #ff3e3e;">SYSTEM LOCKED</div>
            <button class="btn btn-black" onclick="openPinModal()">UPDATE SYSTEM PIN</button>
            <button class="btn" style="background:#eee" onclick="clearPath()">CLEAR MAP PATHS</button>
            <div style="text-align: center; margin-top: 30px;">
                <a href="#" onclick="forgotPin()" style="font-size: 11px; color: #bbb; text-decoration: none;">System Reset to Default</a>
            </div>
        </div>
    </section>
</div>

<div id="settingsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.98); z-index:3000; align-items: center; justify-content: center;">
    <div class="panel">
        <h2>Update Master PIN</h2>
        <input type="password" id="oldPin" placeholder="Current PIN" style="margin-bottom: 10px;">
        <input type="password" id="newPin" placeholder="New PIN" maxlength="4">
        <button class="btn btn-black" onclick="saveNewPin()">UPDATE</button>
        <button class="btn" onclick="closeSettings()">CANCEL</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const channelID = "3300600", readKey = "M8RQ5ECSRWHF5ZRE", talkBackID = "56620", talkBackKey = "6H22BCX9X5LZ8II6";
    
    if (!localStorage.getItem('navPin')) localStorage.setItem('navPin', '1234');

    function showPage(pageId, elm) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        elm.classList.add('active');
        if(pageId === 'mapPage') setTimeout(() => map.invalidateSize(), 200);
    }

    var map = L.map('map', {zoomControl: false}).setView([23.13161, 88.54735], 18);
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    var boatPath = L.polyline([], {color: '#000', weight: 2, dashArray: '5, 10'}).addTo(map);
    var boatIcon = L.circleMarker([0,0], { radius: 10, color: '#000', fillColor: '#d4ff00', fillOpacity: 1, weight: 4 }).addTo(map);
    var visualFence = L.circle([23.13161, 88.54735], { radius: 50, color: '#ff3e3e', weight: 1, fillOpacity: 0.05 }).addTo(map);
    var safetyRing = L.circle([23.13161, 88.54735], { radius: 43, color: '#000', weight: 1, dashArray: '5, 5', fillOpacity: 0 }).addTo(map);

    function checkAuth() {
        const pinInput = document.getElementById('adminPin').value;
        const savedPin = localStorage.getItem('navPin');
        const syncBtn = document.getElementById('syncBtn');
        const lockIcon = document.getElementById('lockIcon');
        const mainLock = document.getElementById('mainLockIcon');
        const btnText = document.getElementById('btnText');
        const authStatus = document.getElementById('authStatus');

        if(pinInput === savedPin) {
            syncBtn.disabled = false;
            lockIcon.className = "fa-solid fa-unlock";
            mainLock.style.color = "#d4ff00";
            btnText.innerText = "AUTHORIZE & DISPATCH";
            syncBtn.style.background = "#d4ff00";
            syncBtn.style.color = "#000";
            authStatus.innerText = "UNLOCKED: SESSION ACTIVE";
            authStatus.style.color = "#00e676";
        } else {
            syncBtn.disabled = true;
            lockIcon.className = "fa-solid fa-lock";
            mainLock.style.color = "";
            btnText.innerText = "ACCESS DENIED: LOCKED";
            syncBtn.style.background = "";
            syncBtn.style.color = "";
            authStatus.innerText = "SYSTEM LOCKED";
            authStatus.style.color = "#ff3e3e";
        }
    }

    async function updateData() {
        try {
            const res = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
            const data = await res.json();
            const feed = data.feeds[0];
            if (feed) {
                const lat = parseFloat(feed.field1), lon = parseFloat(feed.field2), statusMsg = String(feed.field3 || "").toUpperCase();
                if (!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                    boatIcon.setLatLng([lat, lon]); boatPath.addLatLng([lat, lon]);
                    document.getElementById('boatCoords').innerText = `LAT: ${lat.toFixed(5)} | LON: ${lon.toFixed(5)}`;
                }
                document.getElementById('lastSyncTime').innerText = new Date(feed.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                let label = document.getElementById('statusLabel'), dot = document.getElementById('statDot'), sosNav = document.getElementById('sosNav');
                if (statusMsg.includes("SOS")) {
                    label.innerText = "DISTRESS SIGNAL"; dot.style.background = "red";
                    sosNav.classList.add('danger-active');
                } else if (statusMsg.includes("ALERT")) {
                    label.innerText = "BOUNDARY BREACH"; dot.style.background = "orange";
                    sosNav.classList.remove('danger-active');
                } else {
                    label.innerText = "VESSEL SECURE"; dot.style.background = "#d4ff00";
                    sosNav.classList.remove('danger-active');
                }
            }
        } catch (e) {}
    }

    async function updateGeofence() {
        const lat = document.getElementById('cmdLat').value, lon = document.getElementById('cmdLon').value, rad = document.getElementById('cmdRad').value, buf = document.getElementById('cmdBuf').value;
        const params = new URLSearchParams(); params.append('api_key', talkBackKey); params.append('command_string', `SET:${lat},${lon},${rad},${buf}`);
        const res = await fetch(`https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`, { method: 'POST', body: params });
        if(res.ok) {
            visualFence.setLatLng([lat, lon]); visualFence.setRadius(parseFloat(rad));
            safetyRing.setLatLng([lat, lon]); safetyRing.setRadius(parseFloat(rad) - parseFloat(buf));
            map.flyTo([lat, lon], 18);
            alert("COMMAND DISPATCHED");
        }
    }

    async function acknowledgeSOS() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        if(!isAuth) {
            showPage('securityPage', document.querySelector('[title="Admin"]'));
            return alert("Authentication Required: Enter PIN first.");
        }
        const params = new URLSearchParams(); params.append('api_key', talkBackKey); params.append('command_string', "ACK_SOS");
        await fetch(`https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`, { method: 'POST', body: params });
        alert("BROADCAST SENT");
    }

    function openPinModal() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveNewPin() {
        if(document.getElementById('oldPin').value === localStorage.getItem('navPin')) {
            localStorage.setItem('navPin', document.getElementById('newPin').value); alert("PIN UPDATED"); location.reload();
        } else { alert("Verification Failed"); }
    }
    function forgotPin() { if(prompt("Project Name?").toLowerCase() === "navrakhshak") { localStorage.setItem('navPin', '1234'); location.reload(); }}
    function clearPath() { boatPath.setLatLngs([]); alert("PURGED"); }

    setInterval(updateData, 15000); updateData();
</script>
</body>
</html>
