<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAVRAKHSHAK | Tactical Maritime Operations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --bg-dark: #05070c;
            --panel-bg: rgba(11, 15, 26, 0.85);
            --border-glow: rgba(0, 240, 255, 0.12);
            --text-main: #f3f6fa;
            --text-muted: #5c6e85;
            --neon-cyan: #00f0ff;
            --neon-blue: #0066ff;
            --neon-danger: #ff0055;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: var(--font-main); background: var(--bg-dark); 
            color: var(--text-main); overflow: hidden; 
        }

        .app-container { display: flex; height: 100vh; width: 100vw; flex-direction: column; }
        @media (min-width: 992px) { .app-container { flex-direction: row; } }

        /* Left Navigation Bar (Fully Mobile Optimized) */
        aside {
            width: 100%; background: #080b12; border-bottom: 1px solid rgba(255,255,255,0.04); 
            display: flex; flex-direction: row; align-items: center; justify-content: space-between;
            padding: 12px 16px; z-index: 2000; box-sizing: border-box;
        }
        @media (min-width: 992px) { 
            aside { 
                width: 240px; height: 100vh; flex-direction: column; 
                border-right: 1px solid rgba(255,255,255,0.04); border-bottom: none;
                padding: 35px 20px; justify-content: flex-start; gap: 40px;
            } 
        }

        .brand-logo { font-size: 20px; font-weight: 700; letter-spacing: 2px; color: #fff; }
        .brand-sub { font-size: 9px; color: var(--neon-cyan); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 3px; font-weight: 600; }

        .nav-list { display: flex; flex-direction: row; gap: 6px; width: auto; overflow-x: auto; }
        @media (min-width: 992px) { .nav-list { flex-direction: column; gap: 12px; width: 100%; overflow-x: visible; } }

        .nav-item {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.04); 
            color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; padding: 10px 14px; border-radius: 8px; cursor: pointer; 
            transition: all 0.2s; display: flex; align-items: center; gap: 10px; white-space: nowrap;
        }
        @media (min-width: 992px) { .nav-item { padding: 14px 18px; width: 100%; } }
        .nav-item:hover { background: rgba(0, 102, 255, 0.08); color: #fff; border-color: var(--neon-blue); }
        .nav-item.active { 
            background: linear-gradient(135deg, var(--neon-blue), #0044ff); color: #fff; border-color: var(--neon-cyan);
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
        }

        /* Right Content Workspace Area */
        .main-workspace { flex-grow: 1; position: relative; height: 100%; background: #030407; }
        #map { height: 100%; width: 100%; position: absolute; z-index: 1; }

        /* Left-Side Control Sliding Sidebar Panels */
        .hud-panel { 
            position: absolute; top: 15px; left: 15px; bottom: 15px;
            width: calc(100% - 30px); max-width: 360px; background: var(--panel-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow); border-radius: 14px; z-index: 1000;
            padding: 24px; box-sizing: border-box; display: none; flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); pointer-events: auto;
            animation: slideLeft 0.25s ease-out;
        }
        .hud-panel.active { display: flex; }

        /* NEW RIGHT SIDEBAR PANEL STRUCTURE FOR WEATHER DISPLAY */
        .weather-panel {
            position: absolute; top: 15px; right: 15px; bottom: 15px;
            width: calc(100% - 30px); max-width: 320px; background: var(--panel-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow); border-radius: 14px; z-index: 1000;
            padding: 24px; box-sizing: border-box; display: none; flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); pointer-events: auto;
            animation: slideRight 0.25s ease-out;
        }
        .weather-panel.active { display: flex; }

        @keyframes slideLeft { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .panel-title { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 20px; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        
        /* Mobile-Responsive Forms & Layout Elements */
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 600; }
        input { 
            width: 100%; background: rgba(3, 5, 10, 0.7); border: 1px solid rgba(255,255,255,0.06); 
            padding: 12px; color: #fff; border-radius: 8px; font-family: var(--font-mono); 
            font-size: 12px; box-sizing: border-box; transition: all 0.2s;
        }
        input:focus { border-color: var(--neon-cyan); outline: none; }

        .btn-dispatch { 
            width: 100%; background: linear-gradient(135deg, #0066ff, #0044ff); color: #fff; 
            border: 1px solid var(--neon-cyan); padding: 14px; font-weight: 700; font-size: 12px;
            text-transform: uppercase; letter-spacing: 1px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .btn-dispatch:disabled { background: #121722; border-color: rgba(255,255,255,0.03); color: #343f52; cursor: not-allowed; }

        .btn-danger {
            width: 100%; background: rgba(255, 0, 85, 0.1); color: var(--neon-danger);
            border: 1px solid var(--neon-danger); padding: 12px; font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: all 0.2s;
        }
        .btn-danger:hover { background: var(--neon-danger); color: #fff; box-shadow: 0 0 15px rgba(255,0,85,0.3); }

        /* Floating Badge Containers */
        .status-badge { position: absolute; top: 15px; right: 15px; background: rgba(8, 11, 20, 0.9); backdrop-filter: blur(10px); padding: 10px 18px; border-radius: 30px; font-size: 10px; font-weight: 700; z-index: 999; border: 1px solid var(--border-glow); font-family: var(--font-mono); letter-spacing: 0.5px; }
        
        .overlay-card { 
            position: absolute; bottom: 15px; left: 15px; background: rgba(8, 11, 20, 0.9);
            backdrop-filter: blur(10px); padding: 16px; border-radius: 12px; z-index: 999; 
            border-left: 4px solid var(--neon-blue); width: calc(100% - 30px); max-width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: none;
        }

        /* Floating Toggle Trigger Button for Weather Panel */
        .weather-toggle-btn {
            position: absolute; bottom: 15px; right: 15px; background: rgba(8, 11, 20, 0.9);
            backdrop-filter: blur(10px); border: 1px solid var(--border-glow); color: var(--neon-cyan);
            width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            z-index: 999; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: all 0.2s;
        }
        .weather-toggle-btn:hover { background: var(--neon-blue); color: #fff; }

        .data-grid { font-family: var(--font-mono); font-size: 11px; margin-top: 12px; background: rgba(0,0,0,0.25); padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.02); }
        .grid-item { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .grid-item:last-child { margin-bottom: 0; }

        .pulse-alarm { background: var(--neon-danger) !important; color: #fff !important; animation: flash 1s infinite; border-color: #ff6699 !important; }
        @keyframes flash { 50% { opacity: 0.6; } }

        /* Weather UI Specs */
        .weather-val { font-size: 26px; font-weight: 700; margin-top: 5px; color: var(--neon-cyan); font-family: var(--font-mono); }

        /* MEDIA QUERIES FOR SMALL PHONE VIEWPORTS */
        @media (max-width: 768px) {
            .hud-panel, .weather-panel { top: auto; bottom: 0; left: 0; right: 0; width: 100%; max-width: 100%; border-radius: 14px 14px 0 0; border-right: none; border-left: none; max-height: 50vh; overflow-y: auto; }
            .status-badge { top: 70px; }
            .overlay-card { bottom: auto; top: 120px; }
            .weather-toggle-btn { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <div class="brand">
            <div class="brand-logo">NAVRAKHSHAK</div>
            <div class="brand-sub">Control Hub System</div>
        </div>
        <nav class="nav-list">
            <button class="nav-item active" onclick="showPage('mapPage', this)"><i class="fa-solid fa-satellite"></i> <span>Surveillance</span></button>
            <button class="nav-item" onclick="showPage('adminPage', this)"><i class="fa-solid fa-compass"></i> <span>Command</span></button>
            <button class="nav-item" id="sosNavBtn" onclick="showPage('rescuePage', this)"><i class="fa-solid fa-triangle-exclamation"></i> <span>Rescue Ack</span></button>
        </nav>
    </aside>

    <div class="main-workspace">
        <div id="map"></div>
        <div class="status-badge" id="statusBadge">LINK: INITIALIZING</div>

        <div class="weather-toggle-btn" onclick="toggleWeatherPanel()"><i class="fa-solid fa-cloud-sun-rain"></i></div>

        <div class="overlay-card">
            <label style="font-size: 8px; color: var(--text-muted);">Vessel Tracking Position</label>
            <div style="font-family: var(--font-mono); font-size: 14px; font-weight: 700; margin-bottom: 5px;" id="boatCoords">CONNECTING...</div>
            <div style="font-family: var(--font-mono); font-size: 10px; color: var(--neon-cyan);" id="syncTime">DIST TO EDGE: -- m</div>
        </div>

        <section id="mapPage" class="hud-panel active">
            <div class="panel-title">MONITOR METRICS</div>
            <div class="data-grid">
                <div class="grid-item"><span>Transponder State:</span><span id="srvStatus" style="color:var(--neon-cyan)">STANDBY</span></div>
                <div class="grid-item"><span>Cloud Sync Pipe:</span><span style="color:#00ff88">ONLINE</span></div>
                <div class="grid-item"><span>Network Latency:</span><span>14ms (RTT)</span></div>
            </div>
        </section>

        <section id="weatherSidebar" class="weather-panel">
            <div class="panel-title">METEOROLOGICAL SPEC</div>
            <label>Live Coordinates Climate</label>
            <div class="weather-val" id="weatherTemp">--°C</div>
            <div style="font-size:11px; margin-top:4px; color:var(--text-muted)" id="weatherDesc">Awaiting valid target transponder...</div>
            
            <button class="btn-danger" onclick="triggerManualWeatherAlert()"><i class="fa-solid fa-cloud-bolt"></i> Broadcast Weather Warning</button>
        </section>

        <section id="adminPage" class="hud-panel">
            <div class="panel-title">BOUNDARIES CONFIG</div>
            <div style="margin-bottom: 12px;">
                <label>Target Latitude / Longitude</label>
                <div class="form-row">
                    <input type="number" id="cmdLat" step="0.000001">
                    <input type="number" id="cmdLon" step="0.000001">
                </div>
            </div>
            <div style="margin-bottom: 15px;">
                <label>Radius & Buffer (meters)</label>
                <div class="form-row">
                    <input type="number" id="cmdRad" placeholder="Radius">
                    <input type="number" id="cmdBuf" placeholder="Buffer">
                </div>
            </div>
            <div style="border-top:1px solid rgba(255,255,255,0.05); padding-top:12px; margin-bottom:12px;">
                <label>Security Authentication PIN</label>
                <input type="password" id="adminPin" placeholder="Master PIN (1234)" maxlength="4" oninput="checkAuth()">
            </div>
            <button id="syncBtn" class="btn-dispatch" onclick="updateGeofence()" disabled>Dispatch Boundary</button>
            <button onclick="clearPath()" style="background:none; border:none; color:var(--neon-danger); font-size:10px; font-weight:700; margin-top:12px; cursor:pointer;"><i class="fa-solid fa-trash"></i> Clear Trail Map</button>
        </section>

        <section id="rescuePage" class="hud-panel">
            <div class="panel-title">RESCUE OPERATION</div>
            <label>Override PIN Code</label>
            <input type="password" id="rescuePin" placeholder="Enter PIN to clear alarms" maxlength="4">
            <button class="btn-dispatch pulse-alarm" onclick="acknowledgeSOS()" style="margin-top:15px;">Broadcast Emergency Ack</button>
        </section>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCxrvcgU0cnZsthDZp3eRKKeO0QQWYdDoA",
        authDomain: "navrakhshak-web.firebaseapp.com",
        databaseURL: "https://navrakhshak-web-default-rtdb.firebaseio.com",
        projectId: "navrakhshak-web",
        storageBucket: "navrakhshak-web.appspot.com",
        messagingSenderId: "690586658424",
        appId: "1:690586658424:web:be9438d65035863783af8d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let fenceLat = parseFloat(localStorage.getItem('fLat')) || 23.13161;
    let fenceLon = parseFloat(localStorage.getItem('fLon')) || 88.54735;
    let fenceRad = parseFloat(localStorage.getItem('fRad')) || 50;
    let lastWeatherCheckTime = 0;

    var map = L.map('map', {zoomControl: false, attributionControl: false}).setView([fenceLat, fenceLon], 15);
    var lastLat = 0, lastLon = 0;

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

    var boatPath = L.polyline([], {color: '#00f0ff', weight: 4, opacity: 0.8, dashArray: '5, 10'}).addTo(map);
    var boatIcon = L.circleMarker([fenceLat, fenceLon], { radius: 8, color: '#fff', fillColor: '#0066ff', fillOpacity: 1, weight: 3 }).addTo(map);
    var visualFence = L.circle([fenceLat, fenceLon], { radius: fenceRad, color: '#ff0055', weight: 1.5, fillOpacity: 0.04, dashArray: '4, 4' }).addTo(map);

    document.getElementById('cmdLat').value = fenceLat;
    document.getElementById('cmdLon').value = fenceLon;
    document.getElementById('cmdRad').value = fenceRad;
    document.getElementById('cmdBuf').value = parseFloat(localStorage.getItem('fBuf')) || 10;

    function showPage(pID, btn) {
        document.querySelectorAll('.hud-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(pID).classList.add('active');
        // Close weather sidebar automatically on mobile layout menu shifts
        if (window.innerWidth < 768) document.getElementById('weatherSidebar').classList.remove('active');
        setTimeout(() => { map.invalidateSize(); }, 200);
    }

    // Toggle logic function for the distinct weather panel
    function toggleWeatherPanel() {
        const sideBar = document.getElementById('weatherSidebar');
        sideBar.classList.toggle('active');
    }

    // MANUAL WARNING DOWNLINK TRIGGER METHOD
    function triggerManualWeatherAlert() {
        db.ref('config/syncCommand').set("WEATHER_ALERT").then(() => {
            alert("MANUAL WEATHER WARNING DISPATCHED DOWN TO CHANNELS.");
        });
    }

    function checkAuth() {
        const enteredPin = document.getElementById('adminPin').value;
        document.getElementById('syncBtn').disabled = (enteredPin != "1234");
    }

    function syncVisuals(lat, lon, rad, buf) {
        visualFence.setLatLng([lat, lon]);
        visualFence.setRadius(rad);
        localStorage.setItem('fLat', lat);
        localStorage.setItem('fLon', lon);
        localStorage.setItem('fRad', rad);
        localStorage.setItem('fBuf', buf);
    }

    function fetchLocationWeather(lat, lon) {
        if (Date.now() - lastWeatherCheckTime < 120000) return;
        lastWeatherCheckTime = Date.now();

        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
            .then(res => res.json())
            .then(weather => {
                if (weather && weather.current_weather) {
                    const temp = weather.current_weather.temperature;
                    const windSpeed = weather.current_weather.windspeed;
                    
                    document.getElementById('weatherTemp').innerText = `${temp}°C`;
                    document.getElementById('weatherDesc').innerText = `Wind Speed: ${windSpeed} km/h`;

                    // Automatic safety alert dispatch logic
                    if (windSpeed > 25.0) {
                        document.getElementById('statusBadge').innerText = "WEATHER ALERT";
                        document.getElementById('statusBadge').className = "status-badge pulse-alarm";
                        db.ref('config/syncCommand').set("WEATHER_ALERT");
                    }
                }
            }).catch(err => console.log("Weather fetch error: ", err));
    }

    function initializeFirebaseListeners() {
        db.ref('boat').on('value', (snapshot) => {
            const data = snapshot.val();
            let badge = document.getElementById('statusBadge');
            let sosBtn = document.getElementById('sosNavBtn');
            let srvStat = document.getElementById('srvStatus');
            
            if (!data) {
                badge.innerText = "LINK: OFFLINE";
                return;
            }

            const cLat = parseFloat(data.latitude);
            const cLon = parseFloat(data.longitude);
            const statusMsg = String(data.status || "WAITING").toUpperCase();
            const borderDist = parseFloat(data.distanceToBorder || 0.0);

            if (!isNaN(cLat) && !isNaN(cLon) && cLat !== 0 && cLon !== 0) {
                lastLat = cLat; lastLon = cLon;
                boatIcon.setLatLng([lastLat, lastLon]);
                boatPath.addLatLng([lastLat, lastLon]);
                document.getElementById('boatCoords').innerText = `${lastLat.toFixed(6)}, ${lastLon.toFixed(6)}`;
                map.panTo([lastLat, lastLon]);
                
                fetchLocationWeather(lastLat, lastLon);
            }
            
            document.getElementById('syncTime').innerText = `DIST TO EDGE: ${borderDist.toFixed(1)} m`;
            
            if (statusMsg.includes("SOS") || statusMsg.includes("ALERT") || data.isAlertActive === true) {
                badge.innerText = `ALARM: ${statusMsg}`; 
                badge.className = 'status-badge pulse-alarm';
                sosBtn.className = 'nav-item pulse-alarm';
                if(srvStat) { srvStat.innerText = "CRITICAL WARNING"; srvStat.style.color = "#ff0055"; }
                boatIcon.setStyle({fillColor: '#ff0055'}); 
            } else {
                badge.innerText = `LINK: SECURE / ${statusMsg}`; 
                badge.className = 'status-badge';
                sosBtn.className = 'nav-item';
                if(srvStat) { srvStat.innerText = "ACTIVE ACTIVE"; srvStat.style.color = "#00f0ff"; }
                boatIcon.setStyle({fillColor: '#0066ff'});
            }
        });

        db.ref('preferences').on('value', (snapshot) => {
            const prefs = snapshot.val();
            if (prefs && prefs.lat && prefs.lon) {
                syncVisuals(parseFloat(prefs.lat), parseFloat(prefs.lon), parseFloat(prefs.rad), parseFloat(prefs.buf));
                document.getElementById('cmdLat').value = prefs.lat;
                document.getElementById('cmdLon').value = prefs.lon;
                document.getElementById('cmdRad').value = prefs.rad;
                document.getElementById('cmdBuf').value = prefs.buf;
            }
        });
    }

    function updateGeofence() {
        const lat = parseFloat(document.getElementById('cmdLat').value);
        const lon = parseFloat(document.getElementById('cmdLon').value);
        const rad = parseFloat(document.getElementById('cmdRad').value);
        const buf = parseFloat(document.getElementById('cmdBuf').value);
        
        if (isNaN(lat) || isNaN(lon) || isNaN(rad)) return alert("Please enter valid parameters.");
        
        syncVisuals(lat, lon, rad, buf);
        db.ref('preferences').set({ lat: lat, lon: lon, rad: rad, buf: buf });

        const commandString = `SET:${lat},${lon},${rad},${buf}`;
        db.ref('config/syncCommand').set(commandString).then(() => {
            alert("BOUNDARY DISPATCHED TO GATEWAY.");
        });
    }

    function acknowledgeSOS() {
        const enteredPin = document.getElementById('rescuePin').value;
        if(enteredPin != "1234") return alert("Invalid Authentication Code.");
        
        db.ref('config/syncCommand').set("ACK_SOS").then(() => {
            alert("RESCUE ACK COMMAND DISPATCHED.");
            document.getElementById('rescuePin').value = "";
        });
    }

    function clearPath() { boatPath.setLatLngs([]); alert("MAP TRAIL PURGED."); }

    window.addEventListener('DOMContentLoaded', () => { initializeFirebaseListeners(); });
    window.addEventListener('resize', () => { map.invalidateSize(); });
</script>
</body>
</html>
