<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAVRAKHSHAK | 3D Global HUD</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap');

        :root {
            --bg-deep: #f0f2f5;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --text-color: #1a1c1e;
            --accent: #0066ff;
            --danger: #ff3e3e;
            --border: rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-deep: #0a0c10;
                --panel-bg: rgba(13, 17, 23, 0.9);
                --text-color: #e6edf3;
                --accent: #d4ff00;
                --border: rgba(255,255,255,0.1);
            }
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Space Grotesk', sans-serif; background: var(--bg-deep); color: var(--text-color); overflow: hidden; }

        .app-shell { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        @media (min-width: 992px) { .app-shell { flex-direction: row; } }

        aside {
            width: 100%; background: var(--panel-bg); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; flex-direction: column;
            padding: 20px; z-index: 2000; flex-shrink: 0; box-sizing: border-box;
        }
        @media (min-width: 992px) { aside { width: 300px; height: 100vh; border-right: 1px solid var(--border); border-top: none; padding: 40px 30px; } }

        .brand-logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 2px; color: var(--accent); }
        .nav-group { display: flex; flex-direction: row; gap: 10px; margin-top: 15px; }
        @media (min-width: 992px) { .nav-group { flex-direction: column; margin-top: 40px; } }

        .nav-btn {
            flex: 1; background: rgba(128,128,128,0.1); border: none; color: var(--text-color); font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px; text-align: center; cursor: pointer;
            padding: 12px 5px; border-radius: 8px; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
        }
        @media (min-width: 992px) { .nav-btn { flex: none; flex-direction: row; text-align: left; padding: 12px 15px; font-size: 13px; justify-content: flex-start; } }
        .nav-btn:hover, .nav-btn.active { background: var(--accent); color: #000; }

        .viewport { flex-grow: 1; position: relative; width: 100%; height: 100%; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100%; background: #000; }

        .page { position: absolute; inset: 0; display: none; padding: 20px; z-index: 100; pointer-events: none; justify-content: center; align-items: center; }
        .page.active { display: flex; }

        .tech-panel {
            background: var(--panel-bg); border: 1px solid var(--border);
            padding: 25px; border-radius: 15px; width: 100%; max-width: 400px;
            backdrop-filter: blur(25px); pointer-events: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        input {
            width: 100%; background: rgba(128,128,128,0.1); border: 1px solid var(--border);
            padding: 10px; color: var(--text-color); border-radius: 6px; font-family: monospace; margin-bottom: 10px; box-sizing: border-box;
        }

        .action-btn {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            border-radius: 6px; cursor: pointer; transition: 0.3s;
        }

        .hud-tag {
            position: absolute; top: 15px; right: 15px; background: var(--panel-bg);
            padding: 8px 15px; border-radius: 50px; font-size: 9px; font-weight: 800; z-index: 1000; border: 1px solid var(--border);
        }
        .pos-overlay {
            position: absolute; top: 15px; left: 15px; background: var(--panel-bg);
            padding: 10px 15px; border-radius: 10px; z-index: 1000; border-left: 3px solid var(--accent);
        }

        .danger-pulse { background: var(--danger) !important; color: white !important; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="app-shell">
    <aside>
        <div class="brand-zone">
            <div class="brand-logo">NAVRAKHSHAK</div>
            <div style="font-size: 9px; opacity: 0.5;">3D TACTICAL ENGINE</div>
        </div>
        <nav class="nav-group">
            <button class="nav-btn active" onclick="showPage('mapPage', this)"><i class="fa-solid fa-globe"></i> <span>Map</span></button>
            <button class="nav-btn" onclick="showPage('adminPage', this)"><i class="fa-solid fa-terminal"></i> <span>Command</span></button>
            <button class="nav-btn" id="sosNavBtn" onclick="acknowledgeSOS()"><i class="fa-solid fa-satellite-dish"></i> <span>Rescue</span></button>
        </nav>
    </aside>

    <div class="viewport">
        <div id="cesiumContainer"></div>
        <div class="hud-tag" id="statusBadge">3D: INITIALIZING</div>

        <div class="pos-overlay">
            <div style="font-size: 8px; opacity: 0.6;">UNIT_01 POSITION</div>
            <div id="boatCoords" style="font-size: 13px; font-weight: 800; font-family: monospace;">---.--- , ---.---</div>
        </div>

        <section id="adminPage" class="page">
            <div class="tech-panel">
                <div style="font-family:'Syncopate'; font-weight:700; margin-bottom:15px; font-size:18px;">COMMAND</div>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="cmdLat" step="0.000001" placeholder="Lat">
                    <input type="number" id="cmdLon" step="0.000001" placeholder="Lon">
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="cmdRad" placeholder="Radius (m)">
                    <input type="number" id="cmdBuf" placeholder="Buffer (m)">
                </div>
                <button id="syncBtn" class="action-btn" onclick="updateGeofence()" disabled>DISPATCH</button>
                <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
                    <input type="password" id="adminPin" placeholder="Enter Master PIN" maxlength="4" oninput="checkAuth()">
                </div>
            </div>
        </section>
    </div>
</div>

<script>
    const chID = "3300600", rKey = "M8RQ5ECSRWHF5ZRE", tbID = "56620", tbKey = "6H22BCX9X5LZ8II6";
    if (!localStorage.getItem('navPin')) localStorage.setItem('navPin', '1234');

    // FIX: ADD EXPLICIT IMAGERY LAYER
    const openStreetLayer = new Cesium.OpenStreetMapImageryProvider({
        url: 'https://a.tile.openstreetmap.org/'
    });

    const viewer = new Cesium.Viewer('cesiumContainer', {
        imageryProvider: openStreetLayer, // Set default imagery
        terrainProvider: Cesium.createWorldTerrain(),
        animation: false, timeline: false, baseLayerPicker: false, geocoder: false,
        navigationHelpButton: false, sceneModePicker: true, homeButton: false, infoBox: false
    });

    // Zoom to Payradanga Area initially
    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(88.5473, 23.1316, 2000.0),
        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-45), roll: 0 }
    });

    // Boat Marker
    var boatPoint = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(88.54735, 23.13161),
        point: { pixelSize: 12, color: Cesium.Color.LIME, outlineColor: Cesium.Color.BLACK, outlineWidth: 2 },
        label: { text: "VESSEL_NAV", font: "10px monospace", verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -12) }
    });

    // 3D Path Trail
    var pathPositions = [];
    var pathEntity = viewer.entities.add({
        polyline: {
            positions: new Cesium.CallbackProperty(() => pathPositions, false),
            width: 4,
            material: new Cesium.PolylineGlowMaterialProperty({ glowPower: 0.1, color: Cesium.Color.LIME })
        }
    });

    // 3D Geofence Cylinder
    var fenceEntity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(88.54735, 23.13161),
        cylinder: {
            length: 100.0,
            topRadius: 50.0,
            bottomRadius: 50.0,
            material: Cesium.Color.CYAN.withAlpha(0.15),
            outline: true,
            outlineColor: Cesium.Color.CYAN
        }
    });

    function showPage(pID, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(pID !== 'mapPage') document.getElementById(pID).classList.add('active');
        btn.classList.add('active');
    }

    function checkAuth() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        document.getElementById('syncBtn').disabled = !isAuth;
    }

    async function updateData() {
        try {
            const res = await fetch(`https://api.thingspeak.com/channels/${chID}/feeds.json?api_key=${rKey}&results=1`);
            const data = await res.json();
            const feed = data.feeds[0];
            if (feed) {
                const lat = parseFloat(feed.field1), lon = parseFloat(feed.field2), statusMsg = String(feed.field3 || "").toUpperCase();
                if (!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                    const newPos = Cesium.Cartesian3.fromDegrees(lon, lat);
                    boatPoint.position = newPos;
                    pathPositions.push(newPos);
                    document.getElementById('boatCoords').innerText = `${lat.toFixed(5)} , ${lon.toFixed(5)}`;
                }
                
                let badge = document.getElementById('statusBadge');
                if (statusMsg.includes("SOS") || statusMsg.includes("ALERT")) {
                    badge.innerText = "TACTICAL ALERT: BREACH";
                    badge.classList.add('danger-pulse');
                    fenceEntity.cylinder.material = Cesium.Color.RED.withAlpha(0.5);
                    fenceEntity.cylinder.length = 800.0;
                    pathEntity.polyline.material.color = Cesium.Color.RED;
                } else {
                    badge.innerText = "3D ENGINE: ONLINE";
                    badge.classList.remove('danger-pulse');
                    fenceEntity.cylinder.material = Cesium.Color.CYAN.withAlpha(0.15);
                    fenceEntity.cylinder.length = 100.0;
                    pathEntity.polyline.material.color = Cesium.Color.LIME;
                }
            }
        } catch (e) {}
    }

    async function updateGeofence() {
        const lat = parseFloat(document.getElementById('cmdLat').value), lon = parseFloat(document.getElementById('cmdLon').value), rad = parseFloat(document.getElementById('cmdRad').value);
        const command = `SET:${lat},${lon},${rad},7`;
        await fetch(`https://api.thingspeak.com/talkbacks/${tbID}/commands.json?api_key=${tbKey}&command_string=${command}`, { method: 'POST' });
        fenceEntity.position = Cesium.Cartesian3.fromDegrees(lon, lat);
        fenceEntity.cylinder.topRadius = rad;
        fenceEntity.cylinder.bottomRadius = rad;
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lon, lat, 1200.0),
            orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 }
        });
        alert("COMMAND DISPATCHED.");
    }

    async function acknowledgeSOS() {
        if(document.getElementById('adminPin').value !== localStorage.getItem('navPin')) return alert("Auth Required.");
        await fetch(`https://api.thingspeak.com/talkbacks/${tbID}/commands.json?api_key=${tbKey}&command_string=ACK_SOS`, { method: 'POST' });
        alert("BROADCAST SENT.");
    }

    setInterval(updateData, 15000);
    updateData();
</script>
</body>
</html>
