<body>
    <div class="header">
        <h1>NAVRAKHSHAK <span style="color: #00f2ff; font-size: 16px;">V3.0 DYNAMIC</span></h1>
        <div style="display: flex; gap: 10px;">
            <div id="status" class="badge">CONNECTING...</div>
            <div id="warning" class="badge">PROXIMITY ALERT</div>
        </div>
    </div>
    
    <div id="map"></div>

    <div class="control-panel">
        <div>
            <label>Fence Center Lat:</label>
            <input type="number" id="cmdLat" step="0.000001" placeholder="Fetching...">
        </div>
        <div>
            <label>Fence Center Lon:</label>
            <input type="number" id="cmdLon" step="0.000001" placeholder="Fetching...">
        </div>
        <div>
            <label>Total Radius (m):</label>
            <input type="number" id="cmdRad" placeholder="Fetching...">
        </div>
        <div>
            <label>Safety Buffer (m):</label>
            <input type="number" id="cmdBuf" placeholder="Fetching...">
        </div>
        <div style="display:flex; align-items: flex-end;">
            <button onclick="updateGeofence()">SYNC NEW BOUNDARY</button>
        </div>
    </div>

    <div class="footer-info">
        <span id="last-sync">Last Data Sync: --:--:--</span>
        <span id="cmd-status">Command Status: Idle</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const channelID = "3300600"; 
        const readKey = "M8RQ5ECSRWHF5ZRE";
        const talkBackID = "56620"; 
        const talkBackKey = "6H22BCX9X5LZ8II6";

        var map = L.map('map').setView([23.13161, 88.54735], 18);
        L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        var boatPath = L.polyline([], {color: '#f1c40f', weight: 3}).addTo(map);
        var boatIcon = L.circleMarker([0, 0], { radius: 8, color: '#fff', fillColor: '#007bff', fillOpacity: 1 }).addTo(map);
        var visualFence = L.circle([0,0], { radius: 0, color: '#ff0000', weight: 2, fillOpacity: 0.05 }).addTo(map);
        var safetyRing = L.circle([0,0], { radius: 0, color: '#00f2ff', weight: 1, dashArray: '5, 10', fillOpacity: 0 }).addTo(map);

        // --- NEW: FETCH LAST COMMAND ON PAGE LOAD ---
        async function fetchCurrentSettings() {
            try {
                // Fetch the last 1 command from TalkBack history
                const res = await fetch(`https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json?api_key=${talkBackKey}&results=1`);
                const data = await res.json();
                
                if (data.length > 0) {
                    const cmd = data[0].command_string; // e.g., "SET:23.131,88.547,50,7"
                    const parts = cmd.replace("SET:", "").split(",");
                    
                    if (parts.length === 4) {
                        document.getElementById('cmdLat').value = parts[0];
                        document.getElementById('cmdLon').value = parts[1];
                        document.getElementById('cmdRad').value = parts[2];
                        document.getElementById('cmdBuf').value = parts[3];
                        
                        // Update Map visuals to match
                        updateMapVisuals(parts[0], parts[1], parts[2], parts[3]);
                        document.getElementById('cmd-status').innerText = "Settings Loaded from Cloud";
                    }
                }
            } catch (e) { console.error("Error fetching settings", e); }
        }

        function updateMapVisuals(lat, lon, rad, buf) {
            visualFence.setLatLng([lat, lon]);
            visualFence.setRadius(parseFloat(rad));
            safetyRing.setLatLng([lat, lon]);
            safetyRing.setRadius(parseFloat(rad) - parseFloat(buf));
            map.setView([lat, lon], 18);
        }

        async function updateData() {
            try {
                const response = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
                const data = await response.json();
                const feed = data.feeds[0];

                if (feed && feed.field1) {
                    const lat = parseFloat(feed.field1);
                    const lon = parseFloat(feed.field2);
                    const statusMsg = feed.field3 || "";
                    
                    boatIcon.setLatLng([lat, lon]);
                    boatPath.addLatLng([lat, lon]);
                    document.getElementById('last-sync').innerText = `Last Data Sync: ${new Date(feed.created_at).toLocaleTimeString()}`;
                    
                    let statusDiv = document.getElementById('status');
                    if (statusMsg.includes("SOS") || statusMsg.includes("ALERT")) {
                        statusDiv.className = "badge alert-flash";
                        statusDiv.innerHTML = "!!! BOAT ALERT !!!";
                    } else {
                        statusDiv.className = "badge";
                        statusDiv.style.background = "#27ae60";
                        statusDiv.innerHTML = "BOAT SAFE";
                    }
                }
            } catch (e) { console.error("Update Error", e); }
        }

        async function updateGeofence() {
            const lat = document.getElementById('cmdLat').value;
            const lon = document.getElementById('cmdLon').value;
            const rad = document.getElementById('cmdRad').value;
            const buf = document.getElementById('cmdBuf').value;

            document.getElementById('cmd-status').innerText = "Command Status: Sending...";

            const commandString = `SET:${lat},${lon},${rad},${buf}`;
            const url = `https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`;
            const params = new URLSearchParams();
            params.append('api_key', talkBackKey);
            params.append('command_string', commandString);

            try {
                const res = await fetch(url, { method: 'POST', body: params });
                if(res.ok) {
                    updateMapVisuals(lat, lon, rad, buf);
                    document.getElementById('cmd-status').innerText = "Command Status: Sent to Cloud";
                    alert("Fence Updated! Boat will sync shortly.");
                }
            } catch(e) { document.getElementById('cmd-status').innerText = "Command Status: Error"; }
        }

        // Initialize
        fetchCurrentSettings(); // Load what's already on the cloud
        setInterval(updateData, 15000);
        updateData();
    </script>
</body>
