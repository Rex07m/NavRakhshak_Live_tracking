<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAVRAKHSHAK | Maritime Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=300;500;700&family=Syncopate:wght=400;700&display=swap');

        :root {
            --bg-deep: #f0f2f5;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --text-color: #1a1c1e;
            --accent: #0066ff;
            --danger: #ff3e3e;
            --border: rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-deep: #0a0c10;
                --panel-bg: rgba(13, 17, 23, 0.9);
                --text-color: #e6edf3;
                --accent: #d4ff00;
                --border: rgba(255,255,255,0.1);
            }
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Space Grotesk', sans-serif; background: var(--bg-deep); color: var(--text-color); overflow: hidden; }
        .app-shell { display: flex; height: 100vh; width: 100vw; position: relative; flex-direction: column; }
        @media (min-width: 992px) { .app-shell { flex-direction: row; } }

        aside {
            width: 100%; background: var(--panel-bg); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; flex-direction: column;
            padding: 15px; z-index: 2000; flex-shrink: 0; box-sizing: border-box;
        }
        @media (min-width: 992px) { aside { width: 300px; height: 100vh; border-right: 1px solid var(--border); border-top: none; padding: 40px 30px; } }

        .brand-logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 2px; color: var(--accent); }
        .nav-group { display: flex; flex-direction: row; gap: 10px; margin-top: 10px; }
        @media (min-width: 992px) { .nav-group { flex-direction: column; margin-top: 40px; } }

        .nav-btn {
            flex: 1; background: rgba(128,128,128,0.1); border: none; color: var(--text-color); font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px; padding: 12px 5px; border-radius: 8px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
        }
        @media (min-width: 992px) { .nav-btn { flex: none; flex-direction: row; text-align: left; padding: 12px 15px; font-size: 13px; justify-content: flex-start; } }
        .nav-btn:hover, .nav-btn.active { background: var(--accent); color: #000; }

        .viewport { flex-grow: 1; position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #map { height: 100%; width: 100%; z-index: 1; position: absolute; top:0; left:0; }

        .page { position: absolute; inset: 0; display: none; padding: 20px; z-index: 100; pointer-events: none; justify-content: center; align-items: center; }
        .page.active { display: flex; }

        .tech-panel {
            background: var(--panel-bg); border: 1px solid var(--border);
            padding: 30px; border-radius: 20px; width: 100%; max-width: 400px;
            backdrop-filter: blur(25px); pointer-events: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        input { width: 100%; background: rgba(128,128,128,0.1); border: 1px solid var(--border); padding: 12px; color: var(--text-color); border-radius: 8px; font-family: monospace; margin-bottom: 12px; box-sizing: border-box; }
        .action-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .action-btn:disabled { background: #555; opacity: 0.5; cursor: not-allowed; }

        .hud-tag { position: absolute; top: 20px; right: 20px; background: var(--panel-bg); padding: 10px 20px; border-radius: 50px; font-size: 10px; font-weight: 800; z-index: 1000; border: 1px solid var(--border); }
        .pos-overlay { position: absolute; bottom: 20px; left: 20px; background: var(--panel-bg); padding: 15px 20px; border-radius: 12px; z-index: 1000; border-left: 5px solid var(--accent); min-width: 180px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); pointer-events: none; }

        .danger-pulse { background: var(--danger) !important; color: white !important; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="app-shell">
    <aside>
        <div class="brand-logo">NAVRAKHSHAK</div>
        <nav class="nav-group">
            <button class="nav-btn active" onclick="showPage('mapPage', this)"><i class="fa-solid fa-map"></i> <span>Surveillance</span></button>
            <button class="nav-btn" onclick="showPage('adminPage', this)"><i class="fa-solid fa-terminal"></i> <span>Command</span></button>
            <button class="nav-btn" id="sosNavBtn" onclick="acknowledgeSOS()"><i class="fa-solid fa-satellite-dish"></i> <span>Rescue Ack</span></button>
        </nav>
    </aside>

    <div class="viewport">
        <div id="map"></div>
        <div class="hud-tag" id="statusBadge">LINK: INITIALIZING</div>

        <div class="pos-overlay">
            <div style="font-size: 10px; opacity: 0.6; margin-bottom: 5px; font-weight: 700;">TELEMETRY [LAT, LON]</div>
            <div id="boatCoords">AWAITING HARDWARE...</div>
            <div id="syncTime" style="font-size: 10px; opacity: 0.6; margin-top: 5px;">DIST TO EDGE: -- m</div>
        </div>

        <section id="adminPage" class="page">
            <div class="tech-panel">
                <div style="font-family:'Syncopate'; font-weight:700; margin-bottom:20px; font-size:22px;">COMMAND</div>
                <label style="font-size:10px; opacity:0.6;">BOUNDARY SETTINGS</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="cmdLat" step="0.000001" placeholder="Latitude">
                    <input type="number" id="cmdLon" step="0.000001" placeholder="Longitude">
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="cmdRad" placeholder="Radius (m)">
                    <input type="number" id="cmdBuf" placeholder="Buffer (m)">
                </div>
                <button id="syncBtn" class="action-btn" onclick="updateGeofence()" disabled>DISPATCH BOUNDARY</button>
                <div style="margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px;">
                    <label style="font-size:10px; opacity:0.6;">AUTHENTICATION</label>
                    <input type="password" id="adminPin" placeholder="Master PIN (Type 1234)" maxlength="4" oninput="checkAuth()">
                    <button onclick="clearPath()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:11px; font-weight:700; padding:10px 0;">PURGE HISTORY</button>
                    <button onclick="injectDemoData()" style="background:none; border:none; color:gray; cursor:pointer; font-size:11px; display:block; margin-top:5px;">[DEBUG] INJECT TEST HARDWARE DATA</button>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // --- INTEGRATED LIVE SYSTEM CONFIGURATION ENDPOINT ---
    const firebaseConfig = {
        apiKey: "AIzaSyCxrvcgU0cnZsthDZp3eRKKeO0QQWYdDoA",
        authDomain: "navrakhshak-web.firebaseapp.com",
        databaseURL: "https://navrakhshak-web-default-rtdb.firebaseio.com",
        projectId: "navrakhshak-web",
        storageBucket: "navrakhshak-web.appspot.com",
        messagingSenderId: "690586658424",
        appId: "1:690586658424:web:be9438d65035863783af8d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let fenceLat = parseFloat(localStorage.getItem('fLat')) || 23.13161;
    let fenceLon = parseFloat(localStorage.getItem('fLon')) || 88.54735;
    let fenceRad = parseFloat(localStorage.getItem('fRad')) || 50;

    var map = L.map('map', {zoomControl: false, attributionControl: false}).setView([fenceLat, fenceLon], 16);
    var lastLat = 0, lastLon = 0;

    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    var boatPath = L.polyline([], {color: '#d4ff00', weight: 4, opacity: 0.8}).addTo(map);
    var boatIcon = L.circleMarker([fenceLat, fenceLon], { radius: 10, color: '#fff', fillColor: '#007bff', fillOpacity: 1, weight: 3 }).addTo(map);
    
    var visualFence = L.circle([fenceLat, fenceLon], { 
        radius: fenceRad, 
        color: 'red', 
        weight: 2, 
        fillOpacity: 0.15 
    }).addTo(map);

    document.getElementById('cmdLat').value = fenceLat;
    document.getElementById('cmdLon').value = fenceLon;
    document.getElementById('cmdRad').value = fenceRad;
    document.getElementById('cmdBuf').value = parseFloat(localStorage.getItem('fBuf')) || 10;

    function showPage(pID, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(pID !== 'mapPage') document.getElementById(pID).classList.add('active');
        btn.classList.add('active');
        if(pID === 'mapPage') setTimeout(() => { map.invalidateSize(); }, 300);
    }

    function checkAuth() {
        const enteredPin = document.getElementById('adminPin').value;
        const savedPin = localStorage.getItem('navPin') || '1234';
        document.getElementById('syncBtn').disabled = (enteredPin !== savedPin);
    }

    function syncVisuals(lat, lon, rad, buf) {
        visualFence.setLatLng([lat, lon]);
        visualFence.setRadius(rad);
        localStorage.setItem('fLat', lat);
        localStorage.setItem('fLon', lon);
        localStorage.setItem('fRad', rad);
        localStorage.setItem('fBuf', buf);
    }

    function initializeFirebaseListeners() {
        db.ref('boat').on('value', (snapshot) => {
            const data = snapshot.val();
            let badge = document.getElementById('statusBadge');
            let sosBtn = document.getElementById('sosNavBtn');
            
            if (!data) {
                badge.innerText = "LINK: AWAITING DATA";
                return;
            }

            const cLat = parseFloat(data.latitude);
            const cLon = parseFloat(data.longitude);
            const statusMsg = String(data.status || "WAITING").toUpperCase();
            const borderDist = parseFloat(data.distanceToBorder || 0.0);

            if (!isNaN(cLat) && !isNaN(cLon) && cLat !== 0 && cLon !== 0) {
                lastLat = cLat; lastLon = cLon;
                boatIcon.setLatLng([lastLat, lastLon]);
                boatPath.addLatLng([lastLat, lastLon]);
                document.getElementById('boatCoords').innerText = `${lastLat.toFixed(6)}, ${lastLon.toFixed(6)}`;
                map.panTo([lastLat, lastLon]);
            }
            
            document.getElementById('syncTime').innerText = `DIST TO EDGE: ${borderDist.toFixed(1)} m`;
            
            if (statusMsg.includes("SOS") || statusMsg.includes("ALERT") || data.isAlertActive === true) {
                badge.innerText = `ALARM: ${statusMsg}`; 
                badge.className = 'hud-tag danger-pulse';
                sosBtn.className = 'nav-btn danger-pulse';
                boatIcon.setStyle({fillColor: '#ff0000'}); 
            } else {
                badge.innerText = `LINK: SECURE / ${statusMsg}`; 
                badge.className = 'hud-tag';
                sosBtn.className = 'nav-btn';
                boatIcon.setStyle({fillColor: '#007bff'});
            }
        });

        db.ref('preferences').on('value', (snapshot) => {
            const prefs = snapshot.val();
            if (prefs && prefs.lat && prefs.lon) {
                syncVisuals(parseFloat(prefs.lat), parseFloat(prefs.lon), parseFloat(prefs.rad), parseFloat(prefs.buf));
                document.getElementById('cmdLat').value = prefs.lat;
                document.getElementById('cmdLon').value = prefs.lon;
                document.getElementById('cmdRad').value = prefs.rad;
                document.getElementById('cmdBuf').value = prefs.buf;
            }
        });
    }

    function updateGeofence() {
        const lat = parseFloat(document.getElementById('cmdLat').value);
        const lon = parseFloat(document.getElementById('cmdLon').value);
        const rad = parseFloat(document.getElementById('cmdRad').value);
        const buf = parseFloat(document.getElementById('cmdBuf').value);
        
        if (isNaN(lat) || isNaN(lon) || isNaN(rad)) return alert("Please enter valid parameters.");
        
        syncVisuals(lat, lon, rad, buf);
        db.ref('preferences').set({ lat: lat, lon: lon, rad: rad, buf: buf });

        const commandString = `SET:${lat},${lon},${rad},${buf}`;
        db.ref('config/syncCommand').set(commandString).then(() => {
            alert("BOUNDARY DISPATCHED TO GATEWAY.");
        });
    }

    function acknowledgeSOS() {
        const enteredPin = document.getElementById('adminPin').value;
        const savedPin = localStorage.getItem('navPin') || '1234';
        if(enteredPin !== savedPin) return alert("Auth Required. Enter PIN.");
        
        db.ref('config/syncCommand').set("ACK_SOS").then(() => {
            alert("RESCUE ACK COMMAND DISPATCHED.");
        });
    }

    function injectDemoData() {
        db.ref('boat').set({
            latitude: 23.131610,
            longitude: 88.547350,
            status: "SAFE",
            distanceToBorder: 45.5,
            isAlertActive: false
        });
        db.ref('preferences').set({
            lat: 23.131610,
            lon: 88.547350,
            rad: 50,
            buf: 10
        });
        alert("Test frames injected! Go to 'Surveillance' tab to check the map view.");
    }

    function clearPath() { boatPath.setLatLngs([]); alert("MAP PURGED."); }

    window.addEventListener('DOMContentLoaded', () => {
        initializeFirebaseListeners();
    });
    window.addEventListener('resize', () => { map.invalidateSize(); });
</script>
</body>
</html>
