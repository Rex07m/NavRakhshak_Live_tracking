<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavRakhshak Pro | Maritime Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --primary: #00f2ff;
            --danger: #ff4757;
            --success: #2ed573;
            --bg: #0a0e14;
            --card-bg: rgba(28, 40, 51, 0.8);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; overflow: hidden; }

        /* Main Layout */
        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .sidebar { width: 320px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; z-index: 1000; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid #30363d; text-align: center; }
        .stat-card i { color: var(--primary); margin-bottom: 5px; font-size: 18px; }
        .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .stat-value { font-size: 16px; font-weight: bold; margin-top: 5px; }

        /* Map Area */
        .main-content { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        /* Overlay UI */
        .top-bar { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 999; pointer-events: none; }
        .badge-status { pointer-events: auto; padding: 12px 25px; border-radius: 50px; font-weight: bold; background: var(--card-bg); border: 2px solid var(--primary); backdrop-filter: blur(10px); }
        
        /* Control Forms */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 5px; }
        input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-sos { background: var(--danger); color: white; display: none; }
        .btn-outline { background: transparent; border: 1px solid #30363d; color: white; font-size: 12px; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* PIN Protection Overlay */
        .auth-bar { background: #0d1117; padding: 10px; border-radius: 8px; border: 1px solid var(--primary); margin-top: auto; }
        
        .alert-flash { animation: pulse-red 1s infinite; border-color: var(--danger) !important; color: white !important; background: var(--danger) !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } }

        #settingsModal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

<div class="wrapper">
    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-ship"></i> NAVRAKHSHAK </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-satellite"></i>
                <div class="stat-label">Sats</div>
                <div id="statSats" class="stat-value">--</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-signal"></i>
                <div class="stat-label">Signal</div>
                <div id="statRSSI" class="stat-value">-- dBm</div>
            </div>
        </div>

        <div class="form-group">
            <label>Command Lat</label>
            <input type="number" id="cmdLat" step="0.000001" placeholder="23.13161">
        </div>
        <div class="form-group">
            <label>Command Lon</label>
            <input type="number" id="cmdLon" step="0.000001" placeholder="88.54735">
        </div>
        <div class="form-group">
            <label>Fence Radius (m)</label>
            <input type="number" id="cmdRad" placeholder="50">
        </div>
        <div class="form-group">
            <label>Safety Buffer (m)</label>
            <input type="number" id="cmdBuf" placeholder="7">
        </div>

        <button id="syncBtn" class="btn btn-primary" onclick="updateGeofence()" disabled>
            <i class="fa-solid fa-sync"></i> SYNC BOUNDARY
        </button>

        <button class="btn btn-outline" onclick="clearPath()">
            <i class="fa-solid fa-eraser"></i> CLEAR PATH HISTORY
        </button>

        <div class="auth-bar">
            <label style="color:var(--primary); font-size:10px;">ENCRYPTED ACCESS PIN</label>
            <input type="password" id="adminPin" placeholder="****" oninput="checkAuth()">
            <div style="display:flex; justify-content: space-between; margin-top:5px;">
                <a href="#" onclick="forgotPin()" style="font-size:10px; color:#555;">Forgot?</a>
                <a href="#" onclick="openSettings()" style="font-size:10px; color:var(--primary);">Change PIN</a>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div id="status" class="badge-status">SYSTEM INITIALIZING...</div>
            <button id="sosFeedbackBtn" class="badge-status btn-sos" onclick="acknowledgeSOS()">
                <i class="fa-solid fa-life-ring"></i> ACKNOWLEDGE SOS
            </button>
        </div>
        
        <div id="map"></div>

        <div style="position:absolute; bottom:20px; left:20px; background: rgba(0,0,0,0.7); padding:10px; border-radius:5px; z-index:999; border-left:4px solid var(--primary);">
            <div id="boatCoords" style="font-family:monospace; font-size:14px;">POSITION: FETCHING...</div>
            <div id="last-sync" style="font-size:10px; color:#888; margin-top:5px;">LAST SYNC: --:--:--</div>
        </div>
    </main>
</div>

<div id="settingsModal">
    <div class="modal-content" style="background:#161b22; padding:30px; margin: 15% auto; width:300px; border:1px solid var(--primary); border-radius:10px;">
        <h3 style="margin-top:0">Change Master PIN</h3>
        <input type="password" id="oldPin" placeholder="Current PIN">
        <input type="password" id="newPin" placeholder="New 4-Digit PIN" maxlength="4">
        <button class="btn btn-primary" onclick="saveNewPin()">SAVE PIN</button>
        <button class="btn btn-outline" onclick="closeSettings()">CANCEL</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const channelID = "3300600"; 
    const readKey = "M8RQ5ECSRWHF5ZRE";
    const talkBackID = "56620"; 
    const talkBackKey = "6H22BCX9X5LZ8II6";

    if (!localStorage.getItem('navPin')) localStorage.setItem('navPin', '1234');

    var map = L.map('map', {zoomControl: false}).setView([23.13161, 88.54735], 18);
    L.control.zoom({ position: 'topright' }).addTo(map);

    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    var boatPath = L.polyline([], {color: var(--primary), weight: 3, dashArray: '5, 10'}).addTo(map);
    var boatIcon = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#007bff', fillOpacity: 1 }).addTo(map);
    var visualFence = L.circle([23.13161, 88.54735], { radius: 50, color: var(--danger), weight: 2, fillOpacity: 0.1 }).addTo(map);
    var safetyRing = L.circle([23.13161, 88.54735], { radius: 43, color: var(--primary), weight: 1, dashArray: '5, 10', fillOpacity: 0 }).addTo(map);

    function checkAuth() {
        const entered = document.getElementById('adminPin').value;
        const current = localStorage.getItem('navPin');
        const syncBtn = document.getElementById('syncBtn');
        const sosBtn = document.getElementById('sosFeedbackBtn');

        if(entered === current) {
            syncBtn.disabled = false;
            sosBtn.disabled = false;
            document.querySelector('.auth-bar').style.borderColor = var(--success);
        } else {
            syncBtn.disabled = true;
            sosBtn.disabled = true;
            document.querySelector('.auth-bar').style.borderColor = var(--primary);
        }
    }

    async function updateData() {
        try {
            const res = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
            const data = await res.json();
            const feed = data.feeds[0];

            if (feed) {
                const lat = parseFloat(feed.field1);
                const lon = parseFloat(feed.field2);
                const statusMsg = String(feed.field3 || "").toUpperCase().trim();
                
                if (!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                    const pos = [lat, lon];
                    boatIcon.setLatLng(pos);
                    boatPath.addLatLng(pos);
                    document.getElementById('boatCoords').innerHTML = `<span style="color:var(--primary)">LAT:</span> ${lat.toFixed(6)} <span style="color:var(--primary); margin-left:10px;">LON:</span> ${lon.toFixed(6)}`;
                }

                document.getElementById('last-sync').innerText = `LAST UPDATE: ${new Date(feed.created_at).toLocaleTimeString()}`;
                
                let statusDiv = document.getElementById('status');
                let sosBtn = document.getElementById('sosFeedbackBtn');

                if (statusMsg.includes("SOS")) {
                    statusDiv.className = "badge-status alert-flash";
                    statusDiv.innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> EMERGENCY: SOS RECEIVED";
                    sosBtn.style.display = "flex";
                } else if (statusMsg.includes("ALERT")) {
                    statusDiv.className = "badge-status alert-flash";
                    statusDiv.innerHTML = "<i class='fa-solid fa-radiation'></i> BOUNDARY BREACH";
                    sosBtn.style.display = "none";
                } else {
                    statusDiv.className = "badge-status";
                    statusDiv.style.borderColor = var(--success);
                    statusDiv.style.color = var(--success);
                    statusDiv.innerHTML = "<i class='fa-solid fa-circle-check'></i> SYSTEM SECURE: BOAT SAFE";
                    sosBtn.style.display = "none";
                }
            }
        } catch (e) {}
    }

    async function updateGeofence() {
        const lat = document.getElementById('cmdLat').value;
        const lon = document.getElementById('cmdLon').value;
        const rad = document.getElementById('cmdRad').value;
        const buf = document.getElementById('cmdBuf').value;
        sendCommand(`SET:${lat},${lon},${rad},${buf}`, "Command Sent");
        updateMapVisuals(lat, lon, rad, buf);
    }

    async function acknowledgeSOS() { sendCommand("ACK_SOS", "SOS Cleared"); alert("Rescue Response Notified to Boat."); }

    async function sendCommand(cmdStr, successMsg) {
        const url = `https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`;
        const params = new URLSearchParams();
        params.append('api_key', talkBackKey);
        params.append('command_string', cmdStr);
        const res = await fetch(url, { method: 'POST', body: params });
        if(res.ok) alert(successMsg);
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'block'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveNewPin() {
        if(document.getElementById('oldPin').value === localStorage.getItem('navPin')) {
            localStorage.setItem('navPin', document.getElementById('newPin').value);
            alert("New Master PIN Active.");
            location.reload();
        }
    }
    function forgotPin() {
        if(prompt("Security Question: Project Name?").toLowerCase() === "navrakhshak") {
            localStorage.setItem('navPin', '1234');
            location.reload();
        }
    }

    function clearPath() { boatPath.setLatLngs([]); }
    function var(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

    setInterval(updateData, 15000);
    updateData();
</script>
</body>
</html>
