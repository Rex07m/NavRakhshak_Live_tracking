<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVRAKHSHAK | Maritime Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --bg-primary: #f4f4f2; /* Sanrita Light Grey/Cream */
            --bg-dark: #121212;    /* Carbon Black */
            --accent: #d4ff00;     /* Neon Lime */
            --danger: #ff3e3e;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --border: rgba(0,0,0,0.1);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-dark); overflow: hidden; }

        /* MULTI-PAGE STRUCTURE */
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* NAVIGATION BAR (Left) */
        nav { 
            width: 80px; background: var(--bg-dark); display: flex; flex-direction: column; 
            align-items: center; padding: 20px 0; gap: 30px; z-index: 2000;
        }
        .nav-item { 
            color: #555; font-size: 20px; cursor: pointer; transition: 0.3s; 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px;
        }
        .nav-item:hover, .nav-item.active { color: var(--accent); background: rgba(212, 255, 0, 0.1); }
        .nav-item.danger-active { color: var(--danger); animation: pulse-red 1s infinite; }

        /* CONTENT AREAS */
        .page { display: none; flex-grow: 1; height: 100%; position: relative; animation: fadeIn 0.5s ease; }
        .page.active { display: flex; flex-direction: column; }

        /* MAP PAGE */
        #map { height: 100%; width: 100%; background: #ddd; }

        /* PANEL BOXES (For Boundary & Security Pages) */
        .panel { 
            max-width: 600px; margin: auto; background: white; padding: 40px; 
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
            border: 1px solid var(--border);
        }
        .header-title { font-size: 42px; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; margin-bottom: 30px; }

        /* INPUTS & BUTTONS */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #888; }
        input { 
            width: 100%; border: none; background: #f0f0f0; padding: 15px; border-radius: 12px; 
            font-size: 16px; font-weight: 600; box-sizing: border-box;
        }
        .btn { 
            padding: 18px; border-radius: 14px; border: none; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; font-size: 14px;
        }
        .btn-black { background: var(--bg-dark); color: white; }
        .btn-black:hover { background: #333; transform: scale(1.02); }
        .btn-black:disabled { opacity: 0.2; cursor: not-allowed; }

        /* STATUS OVERLAYS */
        .top-status {
            position: absolute; top: 30px; left: 30px; z-index: 1000;
            background: var(--bg-dark); color: white; padding: 12px 25px; border-radius: 40px;
            font-weight: 700; font-size: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px;
        }

        .floating-pos {
            position: absolute; bottom: 30px; right: 30px; z-index: 1000;
            background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 62, 62, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); } }
    </style>
</head>
<body>

<div class="app-container">
    <nav>
        <div class="nav-item active" onclick="showPage('mapPage', this)" title="Live Map"><i class="fa-solid fa-map"></i></div>
        <div class="nav-item" onclick="showPage('boundaryPage', this)" title="Fence Settings"><i class="fa-solid fa-arrows-to-dot"></i></div>
        <div id="sosNav" class="nav-item" onclick="acknowledgeSOS()" title="SOS Status"><i class="fa-solid fa-kit-medical"></i></div>
        <div class="nav-item" onclick="showPage('securityPage', this)" style="margin-top: auto;" title="Admin"><i class="fa-solid fa-lock"></i></div>
    </nav>

    <section id="mapPage" class="page active">
        <div class="top-status">
            <span id="statDot" style="width: 8px; height: 8px; border-radius: 50%; background: var(--accent);"></span>
            <span id="statusLabel">VESSEL SECURE</span>
            <span id="lastSyncTime" style="opacity: 0.5; margin-left: 10px;">--:--</span>
        </div>
        <div id="map"></div>
        <div class="floating-pos">
            <label>Live Telemetry</label>
            <div id="boatCoords" style="font-size: 18px; font-weight: 900; letter-spacing: -1px;">SEARCHING...</div>
        </div>
    </section>

    <section id="boundaryPage" class="page">
        <div class="panel">
            <div class="header-title">GEOFENCE<br><span style="color:var(--accent); background:black; padding: 0 10px;">CONTROL</span></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group"><label>Center Latitude</label><input type="number" id="cmdLat" step="0.000001" placeholder="23.1316"></div>
                <div class="input-group"><label>Center Longitude</label><input type="number" id="cmdLon" step="0.000001" placeholder="88.5473"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group"><label>Outer Radius (m)</label><input type="number" id="cmdRad" placeholder="50"></div>
                <div class="input-group"><label>Buffer Gap (m)</label><input type="number" id="cmdBuf" placeholder="7"></div>
            </div>
            <button id="syncBtn" class="btn btn-black" onclick="updateGeofence()" disabled>AUTHORIZE & SYNC</button>
            <p style="font-size: 10px; color: #888; margin-top: 20px; text-align: center;">Enter PIN in Security Tab to unlock commands.</p>
        </div>
    </section>

    <section id="securityPage" class="page">
        <div class="panel">
            <div class="header-title">SECURITY<br>CORE</div>
            <div class="input-group">
                <label>Master Access PIN</label>
                <input type="password" id="adminPin" placeholder="****" oninput="checkAuth()">
            </div>
            <button class="btn btn-black" onclick="openPinModal()">CHANGE SYSTEM PIN</button>
            <button class="btn" style="background:#ddd" onclick="clearPath()">PURGE PATH LOGS</button>
            <button class="btn" style="margin-top:40px; font-size: 10px; color: #aaa;" onclick="forgotPin()">RESET SYSTEM TO DEFAULT</button>
        </div>
    </section>
</div>

<div id="settingsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:3000; padding: 50px; box-sizing: border-box;">
    <div class="panel">
        <h2>Update Master Key</h2>
        <input type="password" id="oldPin" placeholder="Verify Old PIN" style="margin-bottom: 10px;">
        <input type="password" id="newPin" placeholder="New 4-Digit PIN" maxlength="4">
        <button class="btn btn-black" onclick="saveNewPin()">CONFIRM UPDATE</button>
        <button class="btn" onclick="closeSettings()">CANCEL</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const channelID = "3300600", readKey = "M8RQ5ECSRWHF5ZRE", talkBackID = "56620", talkBackKey = "6H22BCX9X5LZ8II6";
    
    if (!localStorage.getItem('navPin')) localStorage.setItem('navPin', '1234');

    // NAV LOGIC
    function showPage(pageId, elm) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        elm.classList.add('active');
        if(pageId === 'mapPage') setTimeout(() => map.invalidateSize(), 200);
    }

    // MAP SETUP
    var map = L.map('map', {zoomControl: false}).setView([23.13161, 88.54735], 18);
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    var boatPath = L.polyline([], {color: '#000', weight: 2, dashArray: '5, 10'}).addTo(map);
    var boatIcon = L.circleMarker([0,0], { radius: 10, color: '#000', fillColor: '#d4ff00', fillOpacity: 1, weight: 4 }).addTo(map);
    var visualFence = L.circle([23.13161, 88.54735], { radius: 50, color: '#ff3e3e', weight: 1, fillOpacity: 0.05 }).addTo(map);
    var safetyRing = L.circle([23.13161, 88.54735], { radius: 43, color: '#000', weight: 1, dashArray: '5, 5', fillOpacity: 0 }).addTo(map);

    // CORE FUNCTIONS
    function checkAuth() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        document.getElementById('syncBtn').disabled = !isAuth;
    }

    async function updateData() {
        try {
            const res = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
            const data = await res.json();
            const feed = data.feeds[0];
            if (feed) {
                const lat = parseFloat(feed.field1), lon = parseFloat(feed.field2), statusMsg = String(feed.field3 || "").toUpperCase();
                if (!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                    boatIcon.setLatLng([lat, lon]); boatPath.addLatLng([lat, lon]);
                    document.getElementById('boatCoords').innerText = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
                }
                document.getElementById('lastSyncTime').innerText = new Date(feed.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                let label = document.getElementById('statusLabel'), dot = document.getElementById('statDot'), sosNav = document.getElementById('sosNav');
                if (statusMsg.includes("SOS")) {
                    label.innerText = "EMERGENCY: DISTRESS"; dot.style.background = "red";
                    sosNav.classList.add('danger-active');
                } else if (statusMsg.includes("ALERT")) {
                    label.innerText = "WARNING: BREACH"; dot.style.background = "orange";
                    sosNav.classList.remove('danger-active');
                } else {
                    label.innerText = "VESSEL SECURE"; dot.style.background = "#d4ff00";
                    sosNav.classList.remove('danger-active');
                }
            }
        } catch (e) {}
    }

    async function updateGeofence() {
        const lat = document.getElementById('cmdLat').value, lon = document.getElementById('cmdLon').value, rad = document.getElementById('cmdRad').value, buf = document.getElementById('cmdBuf').value;
        const params = new URLSearchParams(); params.append('api_key', talkBackKey); params.append('command_string', `SET:${lat},${lon},${rad},${buf}`);
        const res = await fetch(`https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`, { method: 'POST', body: params });
        if(res.ok) {
            visualFence.setLatLng([lat, lon]); visualFence.setRadius(parseFloat(rad));
            safetyRing.setLatLng([lat, lon]); safetyRing.setRadius(parseFloat(rad) - parseFloat(buf));
            map.flyTo([lat, lon], 18);
            alert("BOUNDARY SYNCHRONIZED");
        }
    }

    async function acknowledgeSOS() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        if(!isAuth) return alert("Enter Admin PIN first!");
        const params = new URLSearchParams(); params.append('api_key', talkBackKey); params.append('command_string', "ACK_SOS");
        await fetch(`https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`, { method: 'POST', body: params });
        alert("RESCUE COORDINATED - BOAT NOTIFIED");
    }

    function openPinModal() { document.getElementById('settingsModal').style.display = 'block'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveNewPin() {
        if(document.getElementById('oldPin').value === localStorage.getItem('navPin')) {
            localStorage.setItem('navPin', document.getElementById('newPin').value); alert("PIN UPDATED"); location.reload();
        }
    }
    function forgotPin() { if(prompt("Reset: Project Name?").toLowerCase() === "navrakhshak") { localStorage.setItem('navPin', '1234'); location.reload(); }}
    function clearPath() { boatPath.setLatLngs([]); }

    setInterval(updateData, 15000); updateData();
</script>
</body>
</html>
