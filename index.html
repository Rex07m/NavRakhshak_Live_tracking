<!DOCTYPE html>
<html>
<head>
    <title>NavRakhshak | Global Maritime Safety</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 70vh; width: 100%; border-radius: 10px; border: 2px solid #34495e; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #00f2ff; padding-bottom: 10px; flex-wrap: wrap; }
        
        .status-box { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .badge { 
            padding: 12px 20px; border-radius: 5px; font-weight: bold; text-transform: uppercase; 
            font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center;
            min-width: 200px; text-align: center; white-space: nowrap;
        }

        #status { background: #1c2833; border: 1px solid #34495e; }
        #warning { background: #e67e22; display: none; border: 1px solid #fff; }
        
        /* --- NEW CONTROL PANEL STYLES --- */
        .control-panel { 
            background: #1c2833; padding: 15px; border-radius: 10px; margin-top: 15px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;
            border: 1px solid #00f2ff;
        }
        .control-panel input { 
            background: #0f0f0f; border: 1px solid #34495e; color: #00f2ff; 
            padding: 8px; border-radius: 5px; outline: none;
        }
        .control-panel button {
            background: #00f2ff; color: #000; border: none; padding: 10px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .control-panel button:hover { background: #008fb3; }
        
        .alert-flash { animation: blinker 0.6s linear infinite; background: #ff0000 !important; color: white !important; box-shadow: 0 0 20px #ff0000; }
        @keyframes blinker { 50% { opacity: 0.4; } }
        
        .info-panel { margin-top: 10px; font-size: 12px; color: #888; font-style: italic; }
    </style>
</head>
<body>
    <div class="header">
        <h1>NAVRAKHSHAK <span style="color: #00f2ff; font-size: 18px;">SECURE MONITOR</span></h1>
        <div class="status-box">
            <div id="status" class="badge">SYSTEM READY</div>
            <div id="warning" class="badge">BOUNDARY ALERT</div>
        </div>
    </div>
    
    <div id="map"></div>

    <div class="control-panel">
        <div>
            <label>Center Lat:</label><br>
            <input type="number" id="cmdLat" step="0.00001" placeholder="22.9596">
        </div>
        <div>
            <label>Center Lon:</label><br>
            <input type="number" id="cmdLon" step="0.00001" placeholder="88.4476">
        </div>
        <div>
            <label>Radius (m):</label><br>
            <input type="number" id="cmdRad" placeholder="15">
        </div>
        <div>
            <label>Buffer (m):</label><br>
            <input type="number" id="cmdBuf" placeholder="5">
        </div>
        <div style="display:flex; align-items: flex-end;">
            <button onclick="updateGeofence()">UPDATE BOAT FENCE</button>
        </div>
    </div>

    <div class="info-panel" id="last-sync">Waiting for LoRa Gateway...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const channelID = "3300600"; 
        const readKey = "M8RQ5ECSRWHF5ZRE";
        const talkBackID = "YOUR_TALKBACK_ID"; // Get this from ThingSpeak Apps -> TalkBack
        const talkBackKey = "YOUR_TALKBACK_API_KEY";

        var map = L.map('map').setView([22.9596, 88.4476], 19);
        L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        var boatPath = L.polyline([], {color: '#f1c40f', weight: 4}).addTo(map);
        var boatIcon = L.circleMarker([0, 0], { radius: 10, color: '#fff', fillColor: '#007bff', fillOpacity: 1 }).addTo(map);
        var visualFence = L.circle([22.9596, 88.4476], { radius: 15, color: '#00f2ff', fillOpacity: 0.1 }).addTo(map);

        async function updateData() {
            try {
                const response = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
                const data = await response.json();
                const feed = data.feeds[0];

                if (feed && feed.field1) {
                    const lat = parseFloat(feed.field1);
                    const lon = parseFloat(feed.field2);
                    const dist = parseFloat(feed.field3);
                    
                    boatIcon.setLatLng([lat, lon]);
                    boatPath.addLatLng([lat, lon]);
                    document.getElementById('last-sync').innerText = `Last Sync: ${new Date(feed.created_at).toLocaleTimeString()}`;
                    
                    // Logic for Status Badges
                    let statusDiv = document.getElementById('status');
                    if (dist === 0.0) {
                        statusDiv.className = "badge alert-flash";
                        statusDiv.innerHTML = "!!! SOS ACTIVE !!!";
                    } else {
                        statusDiv.className = "badge";
                        statusDiv.style.background = "#27ae60";
                        statusDiv.innerHTML = "BOAT ONLINE";
                    }
                }
            } catch (e) { console.error("Sync Error", e); }
        }

        // NEW: SEND COMMAND TO THINGSPEAK TALKBACK
        async function updateGeofence() {
            const lat = document.getElementById('cmdLat').value;
            const lon = document.getElementById('cmdLon').value;
            const rad = document.getElementById('cmdRad').value;
            const buf = document.getElementById('cmdBuf').value;

            if(!lat || !lon || !rad) return alert("Please fill all fields");

            const commandString = `SET:${lat},${lon},${rad},${buf}`;
            
            // ThingSpeak TalkBack API Call
            const url = `https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`;
            const params = new URLSearchParams();
            params.append('api_key', talkBackKey);
            params.append('command_string', commandString);

            try {
                const res = await fetch(url, { method: 'POST', body: params });
                if(res.ok) {
                    alert("Command Sent! Boat will sync in < 20 seconds.");
                    visualFence.setLatLng([lat, lon]);
                    visualFence.setRadius(parseFloat(rad));
                }
            } catch(e) { alert("Failed to send command."); }
        }

        setInterval(updateData, 15000);
        updateData();
    </script>
</body>
</html>
