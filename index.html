<!DOCTYPE html>
<html>
<head>
    <title>NavRakhshak | Secure Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 65vh; width: 100%; border-radius: 10px; border: 2px solid #34495e; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #00f2ff; padding-bottom: 10px; flex-wrap: wrap; }
        
        .badge { 
            padding: 12px 20px; border-radius: 5px; font-weight: bold; text-transform: uppercase; 
            font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center;
            min-width: 200px; text-align: center;
        }

        #status { background: #1c2833; border: 1px solid #34495e; }
        #warning { background: #e67e22; display: none; border: 1px solid #fff; }
        
        .control-panel { 
            background: #1c2833; padding: 15px; border-radius: 10px; margin-top: 15px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;
            border: 1px solid #00f2ff;
        }
        .control-panel label { font-size: 12px; color: #00f2ff; font-weight: bold; }
        .control-panel input { 
            background: #0f0f0f; border: 1px solid #34495e; color: #fff; 
            padding: 8px; border-radius: 5px; width: 90%;
        }
        .control-panel button {
            background: #00f2ff; color: #000; border: none; padding: 12px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .control-panel button:hover { background: #fff; box-shadow: 0 0 10px #00f2ff; }
        
        .alert-flash { animation: blinker 0.6s linear infinite; background: #ff0000 !important; color: white !important; }
        @keyframes blinker { 50% { opacity: 0.4; } }
        
        .footer-info { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h1>NAVRAKHSHAK <span style="color: #00f2ff; font-size: 16px;">V3.0 DYNAMIC</span></h1>
        <div style="display: flex; gap: 10px;">
            <div id="status" class="badge">CONNECTING...</div>
            <div id="warning" class="badge">PROXIMITY ALERT</div>
        </div>
    </div>
    
    <div id="map"></div>

    <div class="control-panel">
        <div>
            <label>Fence Center Lat:</label>
            <input type="number" id="cmdLat" step="0.000001" value="23.13161">
        </div>
        <div>
            <label>Fence Center Lon:</label>
            <input type="number" id="cmdLon" step="0.000001" value="88.54735">
        </div>
        <div>
            <label>Total Radius (m):</label>
            <input type="number" id="cmdRad" value="50">
        </div>
        <div>
            <label>Safety Buffer (m):</label>
            <input type="number" id="cmdBuf" value="7">
        </div>
        <div style="display:flex; align-items: flex-end;">
            <button onclick="updateGeofence()">SYNC NEW BOUNDARY</button>
        </div>
    </div>

    <div class="footer-info">
        <span id="last-sync">Last Data Sync: --:--:--</span>
        <span id="cmd-status">Command Status: Idle</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const channelID = "3300600"; 
        const readKey = "M8RQ5ECSRWHF5ZRE";
        const talkBackID = "56620"; 
        const talkBackKey = "6H22BCX9X5LZ8II6";

        var map = L.map('map').setView([23.13161, 88.54735], 18);
        L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        var boatPath = L.polyline([], {color: '#f1c40f', weight: 3}).addTo(map);
        var boatIcon = L.circleMarker([0, 0], { radius: 8, color: '#fff', fillColor: '#007bff', fillOpacity: 1 }).addTo(map);
        
        // Outer Danger Boundary
        var visualFence = L.circle([23.13161, 88.54735], { 
            radius: 50, color: '#ff0000', weight: 2, fillOpacity: 0.05 
        }).addTo(map);

        // Inner Safety Alert Ring (Radius - Buffer)
        var safetyRing = L.circle([23.13161, 88.54735], { 
            radius: 43, color: '#00f2ff', weight: 1, dashArray: '5, 10', fillOpacity: 0 
        }).addTo(map);

        async function updateData() {
            try {
                const response = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
                const data = await response.json();
                const feed = data.feeds[0];

                if (feed && feed.field1) {
                    const lat = parseFloat(feed.field1);
                    const lon = parseFloat(feed.field2);
                    const statusMsg = feed.field3; // Alert status sent by boat
                    
                    boatIcon.setLatLng([lat, lon]);
                    boatPath.addLatLng([lat, lon]);
                    document.getElementById('last-sync').innerText = `Last Data Sync: ${new Date(feed.created_at).toLocaleTimeString()}`;
                    
                    let statusDiv = document.getElementById('status');
                    if (statusMsg.includes("SOS") || statusMsg.includes("ALERT")) {
                        statusDiv.className = "badge alert-flash";
                        statusDiv.innerHTML = "!!! BOAT ALERT !!!";
                    } else {
                        statusDiv.className = "badge";
                        statusDiv.style.background = "#27ae60";
                        statusDiv.innerHTML = "BOAT SAFE";
                    }
                }
            } catch (e) { console.error("Update Error", e); }
        }

        async function updateGeofence() {
            const lat = document.getElementById('cmdLat').value;
            const lon = document.getElementById('cmdLon').value;
            const rad = document.getElementById('cmdRad').value;
            const buf = document.getElementById('cmdBuf').value;

            document.getElementById('cmd-status').innerText = "Command Status: Sending...";

            const commandString = `SET:${lat},${lon},${rad},${buf}`;
            const url = `https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`;
            const params = new URLSearchParams();
            params.append('api_key', talkBackKey);
            params.append('command_string', commandString);

            try {
                const res = await fetch(url, { method: 'POST', body: params });
                if(res.ok) {
                    // Update Map Circles
                    visualFence.setLatLng([lat, lon]);
                    visualFence.setRadius(parseFloat(rad));
                    
                    safetyRing.setLatLng([lat, lon]);
                    safetyRing.setRadius(parseFloat(rad) - parseFloat(buf));
                    
                    map.flyTo([lat, lon], 18);
                    document.getElementById('cmd-status').innerText = "Command Status: Sent to Cloud";
                    alert("Fence Updated! Boat will sync shortly.");
                }
            } catch(e) { 
                document.getElementById('cmd-status').innerText = "Command Status: Error";
            }
        }

        setInterval(updateData, 15000);
        updateData();
    </script>
</body>
</html>
