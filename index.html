<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavRakhshak Command | Enterprise Suite</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --bg-body: #0b0f13;
            --bg-card: #151c24;
            --accent-teal: #00d2ff;
            --accent-gold: #c9a050;
            --danger: #ff4d4d;
            --success: #00e676;
            --text-main: #e1e8ef;
            --border-clr: rgba(255, 255, 255, 0.05);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); }

        /* Dashboard Layout */
        .container {
            display: grid;
            height: 100vh;
            grid-template-columns: 400px 1fr;
            grid-template-rows: 80px 1fr;
            grid-template-areas: 
                "header header"
                "controls map";
        }

        /* HEADER SECTION */
        header {
            grid-area: header;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid var(--border-clr);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo { font-size: 24px; font-weight: 900; letter-spacing: 3px; color: var(--accent-teal); }
        .logo span { color: var(--accent-gold); font-size: 14px; letter-spacing: 1px; }

        /* COMMAND SIDEBAR SECTION */
        .sidebar {
            grid-area: controls;
            background: var(--bg-body);
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid var(--border-clr);
        }

        .card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-clr);
            transition: transform 0.2s ease;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* MAP SECTION */
        .map-section {
            grid-area: map;
            position: relative;
            background: #000;
        }

        #map { height: 100%; width: 100%; }

        /* Interactive Inputs */
        .input-box {
            background: #0b0f13;
            border: 1px solid #2d3846;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            color: #fff;
            font-family: monospace;
            box-sizing: border-box;
            margin-top: 5px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        /* Interactive Buttons */
        .btn {
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--accent-teal), #00a8cc); color: #000; }
        .btn-primary:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-primary:disabled { background: #2d3846; color: #64748b; cursor: not-allowed; transform: none; }

        .btn-danger { background: var(--danger); color: #fff; display: none; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }

        /* Status UI */
        .status-pill {
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-clr);
        }

        .floating-pos {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            background: rgba(11, 15, 19, 0.9);
            padding: 15px 25px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-teal);
            backdrop-filter: blur(10px);
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; grid-template-rows: 70px 40vh 1fr; grid-template-areas: "header" "map" "controls"; }
            .sidebar { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">NAVRAKHSHAK <span>PRO MONITOR</span></div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="statusBadge" class="status-pill">LINKING...</div>
            <button id="sosFeedbackBtn" class="btn btn-danger" onclick="acknowledgeSOS()" style="width: auto; padding: 10px 25px;">
                <i class="fa-solid fa-headset"></i> ACKNOWLEDGE SOS
            </button>
        </div>
    </header>

    <aside class="sidebar">
        <div class="card">
            <div class="section-title"><i class="fa-solid fa-microchip"></i> Telemetry Data</div>
            <div class="grid-2">
                <div>
                    <label style="font-size: 10px;">LAST SYNC</label>
                    <div id="statTime" style="font-size: 18px; font-weight: 800; color: var(--accent-teal);">--:--</div>
                </div>
                <div style="text-align: right;">
                    <label style="font-size: 10px;">SIGNAL</label>
                    <div id="statConn" style="font-size: 18px; font-weight: 800; color: #444;">IDLE</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fa-solid fa-compass"></i> Boundary Control</div>
            <div class="grid-2">
                <div>
                    <label>Center Lat</label>
                    <input type="number" id="cmdLat" class="input-box" step="0.000001" placeholder="23.1316">
                </div>
                <div>
                    <label>Center Lon</label>
                    <input type="number" id="cmdLon" class="input-box" step="0.000001" placeholder="88.5473">
                </div>
            </div>
            <div class="grid-2">
                <div>
                    <label>Radius (m)</label>
                    <input type="number" id="cmdRad" class="input-box" placeholder="50">
                </div>
                <div>
                    <label>Buffer (m)</label>
                    <input type="number" id="cmdBuf" class="input-box" placeholder="7">
                </div>
            </div>
            <button id="syncBtn" class="btn btn-primary" onclick="updateGeofence()" disabled style="margin-top: 10px;">
                <i class="fa-solid fa-satellite-dish"></i> SYNC BOUNDARY
            </button>
        </div>

        <div class="card" style="margin-top: auto; border-color: var(--accent-gold);">
            <div class="section-title" style="color: #fff;"><i class="fa-solid fa-user-shield"></i> Security Panel</div>
            <input type="password" id="adminPin" class="input-box" placeholder="Enter Access PIN" oninput="checkAuth()">
            <div style="display: flex; justify-content: space-between; margin-top: 12px;">
                <span onclick="forgotPin()" style="font-size: 10px; cursor: pointer; color: #64748b;">Forgot PIN?</span>
                <span onclick="openSettings()" style="font-size: 10px; cursor: pointer; color: var(--accent-gold);">Change Password</span>
            </div>
            <button class="btn" onclick="clearPath()" style="background: transparent; color: #fff; border: 1px solid #30363d; margin-top: 15px; font-size: 11px;">
                <i class="fa-solid fa-eraser"></i> CLEAR PATH HISTORY
            </button>
        </div>
    </aside>

    <main class="map-section">
        <div id="map"></div>
        <div class="floating-pos">
            <div style="font-size: 10px; color: var(--accent-teal); font-weight: 800; margin-bottom: 5px;">LIVE TRACKING COORDINATES</div>
            <div id="boatCoords" style="font-family: monospace; font-size: 14px; font-weight: 700;">FETCHING LORA FEED...</div>
        </div>
    </main>
</div>

<div id="settingsModal" style="display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);">
    <div class="card" style="width: 320px; margin: 10% auto;">
        <h3 style="margin-top: 0; color: var(--accent-teal);">Security Settings</h3>
        <label>Current PIN</label>
        <input type="password" id="oldPin" class="input-box" style="margin-bottom: 15px;">
        <label>New 4-Digit PIN</label>
        <input type="password" id="newPin" class="input-box" maxlength="4">
        <button class="btn btn-primary" onclick="saveNewPin()" style="margin-top: 20px;">CONFIRM CHANGE</button>
        <button class="btn" onclick="closeSettings()" style="background: none; color: #64748b; margin-top: 10px;">CANCEL</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const channelID = "3300600", readKey = "M8RQ5ECSRWHF5ZRE", talkBackID = "56620", talkBackKey = "6H22BCX9X5LZ8II6";
    
    if (!localStorage.getItem('navPin')) localStorage.setItem('navPin', '1234');

    var map = L.map('map', {zoomControl: false}).setView([23.13161, 88.54735], 18);
    L.control.zoom({ position: 'topright' }).addTo(map);

    // Dark professional satellite tiles
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    var boatPath = L.polyline([], {color: '#00d2ff', weight: 2, opacity: 0.8}).addTo(map);
    var boatIcon = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#007bff', fillOpacity: 1, weight: 3 }).addTo(map);
    var visualFence = L.circle([23.13161, 88.54735], { radius: 50, color: '#ff4d4d', weight: 2, fillOpacity: 0.05 }).addTo(map);
    var safetyRing = L.circle([23.13161, 88.54735], { radius: 43, color: '#00d2ff', weight: 1, dashArray: '5, 10', fillOpacity: 0 }).addTo(map);

    function checkAuth() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        document.getElementById('syncBtn').disabled = !isAuth;
        document.getElementById('sosFeedbackBtn').disabled = !isAuth;
    }

    async function updateData() {
        try {
            const res = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
            const data = await res.json();
            const feed = data.feeds[0];
            if (feed) {
                const lat = parseFloat(feed.field1), lon = parseFloat(feed.field2), statusMsg = String(feed.field3 || "").toUpperCase();
                if (!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                    boatIcon.setLatLng([lat, lon]);
                    boatPath.addLatLng([lat, lon]);
                    document.getElementById('boatCoords').innerText = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                    document.getElementById('statConn').innerText = "LIVE FEED";
                    document.getElementById('statConn').style.color = "#00e676";
                }
                document.getElementById('statTime').innerText = new Date(feed.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                let badge = document.getElementById('statusBadge'), sosBtn = document.getElementById('sosFeedbackBtn');
                if (statusMsg.includes("SOS")) {
                    badge.style.borderColor = "#ff4d4d"; badge.style.color = "#ff4d4d";
                    badge.innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> DISTRESS";
                    sosBtn.style.display = "block";
                } else if (statusMsg.includes("ALERT")) {
                    badge.style.borderColor = "#ffa500"; badge.style.color = "#ffa500";
                    badge.innerHTML = "<i class='fa-solid fa-shield-virus'></i> BREACH";
                    sosBtn.style.display = "none";
                } else {
                    badge.style.borderColor = "#00e676"; badge.style.color = "#00e676";
                    badge.innerHTML = "<i class='fa-solid fa-check-circle'></i> SECURE";
                    sosBtn.style.display = "none";
                }
            }
        } catch (e) {}
    }

    async function updateGeofence() {
        const lat = document.getElementById('cmdLat').value, lon = document.getElementById('cmdLon').value, rad = document.getElementById('cmdRad').value, buf = document.getElementById('cmdBuf').value;
        const url = `https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`;
        const params = new URLSearchParams(); params.append('api_key', talkBackKey); params.append('command_string', `SET:${lat},${lon},${rad},${buf}`);
        const res = await fetch(url, { method: 'POST', body: params });
        if(res.ok) {
            visualFence.setLatLng([lat, lon]); visualFence.setRadius(parseFloat(rad));
            safetyRing.setLatLng([lat, lon]); safetyRing.setRadius(parseFloat(rad) - parseFloat(buf));
            map.flyTo([lat, lon], 18);
            alert("System Synchronized.");
        }
    }

    async function acknowledgeSOS() {
        const params = new URLSearchParams(); params.append('api_key', talkBackKey); params.append('command_string', "ACK_SOS");
        await fetch(`https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`, { method: 'POST', body: params });
        alert("Rescue Team Notification Sent.");
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'block'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveNewPin() {
        if(document.getElementById('oldPin').value === localStorage.getItem('navPin')) {
            localStorage.setItem('navPin', document.getElementById('newPin').value);
            alert("Password Updated."); closeSettings();
        } else { alert("Verification failed."); }
    }
    function forgotPin() {
        if(prompt("Verification: Boat project name?").toLowerCase() === "navrakhshak") {
            localStorage.setItem('navPin', '1234'); alert("Reset to default PIN 1234.");
        }
    }
    function clearPath() { boatPath.setLatLngs([]); }

    setInterval(updateData, 15000);
    updateData();
</script>
</body>
</html>
