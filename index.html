<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavRakhshak Command | Professional Suite</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #1a232e;
            --danger: #ff3e3e;
            --success: #00ff88;
            --bg-dark: #07090c;
            --text: #e0e6ed;
            --border: #2d3846;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; }

        /* Main Dashboard Structure */
        .dashboard { display: grid; grid-template-areas: 
            "header header"
            "sidebar map";
            grid-template-columns: 350px 1fr;
            grid-template-rows: 70px 1fr;
            height: 100vh;
        }

        /* SECTION 1: HEADER (System Status) */
        header { 
            grid-area: header; background: #111821; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px;
        }
        .brand { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: var(--primary); display: flex; align-items: center; gap: 12px; }
        .system-badges { display: flex; gap: 15px; }

        /* SECTION 2: MAP AREA */
        .map-container { grid-area: map; position: relative; border-left: 1px solid var(--border); }
        #map { height: 100%; width: 100%; background: #0b0e14; }

        /* SECTION 3: COMMAND SIDEBAR */
        .sidebar { 
            grid-area: sidebar; background: #0d141d; padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto;
        }
        .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #64748b; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; }

        /* UI Elements */
        .control-group { background: #161f2b; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 5px; }
        input { 
            width: 100%; background: #070b11; border: 1px solid var(--border); color: #fff; 
            padding: 10px; border-radius: 6px; font-family: monospace; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(0, 242, 255, 0.2); }

        /* Interactive Buttons */
        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px;
        }
        .btn-sync { background: var(--primary); color: #000; }
        .btn-sync:hover { background: #fff; transform: translateY(-2px); }
        .btn-sync:disabled { background: #2d3846; color: #64748b; cursor: not-allowed; transform: none; }
        
        .btn-sos { background: var(--danger); color: white; display: none; animation: pulse-red 1.5s infinite; }
        
        /* Floating Info Overlay */
        .pos-overlay { 
            position: absolute; bottom: 25px; right: 25px; background: rgba(13, 20, 29, 0.9);
            padding: 15px 20px; border-radius: 12px; border: 1px solid var(--primary);
            backdrop-filter: blur(8px); z-index: 1000; pointer-events: none;
        }

        /* Animations */
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 62, 62, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); } }

        /* Mobile Adjustments */
        @media (max-width: 991px) {
            .dashboard { grid-template-areas: "header" "map" "sidebar"; grid-template-columns: 1fr; grid-template-rows: 60px 1fr auto; }
            .sidebar { padding: 15px; }
            .map-container { height: 40vh; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="brand"><i class="fa-solid fa-anchor"></i> NAVRAKHSHAK PRO</div>
        <div class="system-badges">
            <div id="statusBadge" style="border: 1px solid var(--border); padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: bold;">
                <i class="fa-solid fa-circle-dot"></i> INITIALIZING
            </div>
            <button id="sosFeedbackBtn" class="btn btn-sos" onclick="acknowledgeSOS()" style="padding: 8px 20px; width: auto; margin: 0;">
                <i class="fa-solid fa-tower-broadcast"></i> SEND RESCUE ACK
            </button>
        </div>
    </header>

    <aside class="sidebar">
        <div>
            <div class="section-label">TELEMETRY DATA</div>
            <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="control-group" style="text-align: center;">
                    <label>LAST SYNC</label>
                    <div id="statTime" style="font-weight: 800; color: var(--primary);">--:--</div>
                </div>
                <div class="control-group" style="text-align: center;">
                    <label>LINK STATUS</label>
                    <div id="statConn" style="font-weight: 800; color: #444;">OFFLINE</div>
                </div>
            </div>
        </div>

        <div>
            <div class="section-label">GEOFENCE CONFIGURATION</div>
            <div class="control-group">
                <label>Center Coordinates (Lat / Lon)</label>
                <div class="input-row">
                    <input type="number" id="cmdLat" step="0.000001" placeholder="23.1316">
                    <input type="number" id="cmdLon" step="0.000001" placeholder="88.5473">
                </div>
                <div class="input-row">
                    <div>
                        <label>Radius (m)</label>
                        <input type="number" id="cmdRad" placeholder="50">
                    </div>
                    <div>
                        <label>Buffer (m)</label>
                        <input type="number" id="cmdBuf" placeholder="7">
                    </div>
                </div>
            </div>
            <button id="syncBtn" class="btn btn-sync" onclick="updateGeofence()" disabled style="margin-top: 15px;">
                <i class="fa-solid fa-shield-halved"></i> SYNC NEW BOUNDARY
            </button>
        </div>

        <div style="margin-top: auto;">
            <div class="section-label">ADMINISTRATION</div>
            <div class="control-group" style="border-color: var(--primary);">
                <label>ENCRYPTED ACCESS PIN</label>
                <input type="password" id="adminPin" placeholder="Enter PIN" oninput="checkAuth()" style="background: #000; border-color: #333;">
                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <button onclick="forgotPin()" style="background: none; border: none; color: #4b5563; font-size: 10px; cursor: pointer;">Forgot PIN?</button>
                    <button onclick="openSettings()" style="background: none; border: none; color: var(--primary); font-size: 10px; cursor: pointer;">Update Security</button>
                </div>
            </div>
            <button class="btn" onclick="clearPath()" style="background: #1e293b; color: #fff; margin-top: 10px;">
                <i class="fa-solid fa-broom"></i> CLEAR PATH LOGS
            </button>
        </div>
    </aside>

    <main class="map-container">
        <div id="map"></div>
        <div class="pos-overlay">
            <label style="color: var(--primary); letter-spacing: 1px;">LIVE POSITIONING</label>
            <div id="boatCoords" style="font-family: 'Courier New', monospace; font-weight: 700; font-size: 15px;">WAITING FOR LORA FEED...</div>
        </div>
    </main>
</div>

<div id="settingsModal" style="display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);">
    <div style="background:#111821; padding:35px; margin: 10% auto; width:320px; border:1px solid var(--primary); border-radius:16px;">
        <h3 style="margin-top:0; color: var(--primary);">Security Management</h3>
        <label>Verify Current PIN</label>
        <input type="password" id="oldPin" style="margin-bottom: 15px;">
        <label>Set New 4-Digit PIN</label>
        <input type="password" id="newPin" maxlength="4">
        <button class="btn btn-sync" onclick="saveNewPin()" style="margin-top: 20px;">UPDATE ENCRYPTION</button>
        <button class="btn" onclick="closeSettings()" style="background:none; color:#64748b;">CANCEL</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const channelID = "3300600", readKey = "M8RQ5ECSRWHF5ZRE", talkBackID = "56620", talkBackKey = "6H22BCX9X5LZ8II6";
    
    if (!localStorage.getItem('navPin')) localStorage.setItem('navPin', '1234');

    // Initialize Map with professional Dark Satellite Style
    var map = L.map('map', {zoomControl: false}).setView([23.13161, 88.54735], 18);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    var boatPath = L.polyline([], {color: '#00f2ff', weight: 2, opacity: 0.6}).addTo(map);
    var boatIcon = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#007bff', fillOpacity: 1, weight: 3 }).addTo(map);
    var visualFence = L.circle([23.13161, 88.54735], { radius: 50, color: '#ff3e3e', weight: 2, fillOpacity: 0.05 }).addTo(map);
    var safetyRing = L.circle([23.13161, 88.54735], { radius: 43, color: '#00f2ff', weight: 1, dashArray: '8, 12', fillOpacity: 0 }).addTo(map);

    function checkAuth() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        document.getElementById('syncBtn').disabled = !isAuth;
        document.getElementById('sosFeedbackBtn').disabled = !isAuth;
    }

    async function updateData() {
        try {
            const res = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=1`);
            const data = await res.json();
            const feed = data.feeds[0];

            if (feed) {
                const lat = parseFloat(feed.field1), lon = parseFloat(feed.field2), statusMsg = String(feed.field3 || "").toUpperCase();
                
                if (!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                    boatIcon.setLatLng([lat, lon]);
                    boatPath.addLatLng([lat, lon]);
                    document.getElementById('boatCoords').innerText = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                    document.getElementById('statConn').innerText = "LIVE FEED";
                    document.getElementById('statConn').style.color = "#00ff88";
                }

                document.getElementById('statTime').innerText = new Date(feed.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                let badge = document.getElementById('statusBadge'), sosBtn = document.getElementById('sosFeedbackBtn');

                if (statusMsg.includes("SOS")) {
                    badge.style.background = "#ff3e3e"; badge.style.color = "#fff";
                    badge.innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> DISTRESS SIGNAL";
                    sosBtn.style.display = "block";
                } else if (statusMsg.includes("ALERT")) {
                    badge.style.background = "rgba(255, 165, 0, 0.2)"; badge.style.color = "#ffa500";
                    badge.innerHTML = "<i class='fa-solid fa-shield-virus'></i> BOUNDARY BREACH";
                    sosBtn.style.display = "none";
                } else {
                    badge.style.background = "none"; badge.style.color = "#00ff88";
                    badge.innerHTML = "<i class='fa-solid fa-circle-check'></i> VESSEL SECURE";
                    sosBtn.style.display = "none";
                }
            }
        } catch (e) { console.error("Sync Error", e); }
    }

    async function updateGeofence() {
        const lat = document.getElementById('cmdLat').value, lon = document.getElementById('cmdLon').value;
        const rad = document.getElementById('cmdRad').value, buf = document.getElementById('cmdBuf').value;
        const command = `SET:${lat},${lon},${rad},${buf}`;
        
        const url = `https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`;
        const params = new URLSearchParams();
        params.append('api_key', talkBackKey);
        params.append('command_string', command);

        const res = await fetch(url, { method: 'POST', body: params });
        if(res.ok) {
            visualFence.setLatLng([lat, lon]); visualFence.setRadius(parseFloat(rad));
            safetyRing.setLatLng([lat, lon]); safetyRing.setRadius(parseFloat(rad) - parseFloat(buf));
            map.flyTo([lat, lon], 18);
            alert("New boundary coordinates synchronized.");
        }
    }

    async function acknowledgeSOS() {
        const params = new URLSearchParams();
        params.append('api_key', talkBackKey);
        params.append('command_string', "ACK_SOS");
        fetch(`https://api.thingspeak.com/talkbacks/${talkBackID}/commands.json`, { method: 'POST', body: params });
        alert("Distress Acknowledgement Broadcasted.");
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'block'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveNewPin() {
        if(document.getElementById('oldPin').value === localStorage.getItem('navPin')) {
            localStorage.setItem('navPin', document.getElementById('newPin').value);
            alert("Security PIN updated successfully.");
            closeSettings();
        } else { alert("Verification failed."); }
    }
    function forgotPin() {
        if(prompt("Verification: Boat project name?").toLowerCase() === "navrakhshak") {
            localStorage.setItem('navPin', '1234');
            alert("Reset to default PIN 1234.");
        }
    }
    function clearPath() { boatPath.setLatLngs([]); }

    setInterval(updateData, 15000);
    updateData();
</script>
</body>
</html>
