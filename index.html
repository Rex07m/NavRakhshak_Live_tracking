<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVRAKHSHAK | Maritime Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap');

        :root {
            --bg-deep: #0e1111;
            --sanrita-sand: #e4e4d9;
            --sanrita-accent: #d4ff00; /* Neon Lime */
            --danger: #ff3e3e;
            --glass: rgba(14, 17, 17, 0.85);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Space Grotesk', sans-serif; background: var(--bg-deep); color: var(--sanrita-sand); overflow: hidden; }

        /* HUD GRID OVERLAY */
        .hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 5;
        }

        .app-shell { display: flex; height: 100vh; width: 100vw; position: relative; z-index: 10; }

        /* SANRITA SIDEBAR */
        aside {
            width: 280px; background: var(--glass); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            padding: 40px 30px; gap: 40px; flex-shrink: 0;
        }

        .brand-zone { margin-bottom: 20px; }
        .brand-logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 4px; color: var(--sanrita-accent); }
        .brand-sub { font-size: 9px; letter-spacing: 2px; opacity: 0.5; margin-top: 5px; text-transform: uppercase; }

        .nav-group { display: flex; flex-direction: column; gap: 15px; }
        .nav-btn {
            background: none; border: none; color: var(--sanrita-sand); font-size: 14px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 2px; text-align: left; cursor: pointer;
            padding: 10px 0; opacity: 0.4; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; gap: 15px;
        }
        .nav-btn:hover, .nav-btn.active { opacity: 1; color: var(--sanrita-accent); transform: translateX(10px); }
        .nav-btn i { font-size: 12px; }

        /* CONTENT PAGES */
        .viewport { flex-grow: 1; position: relative; height: 100%; }
        .page { 
            position: absolute; inset: 0; display: none; padding: 60px; 
            flex-direction: column; align-items: flex-start; z-index: 100;
            animation: pageIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .page.active { display: flex; }
        #map { position: absolute; inset: 0; z-index: 1; filter: grayscale(0.8) contrast(1.2) brightness(0.8); }

        /* TECHNICAL PANELS (Multi-Page Content) */
        .tech-panel {
            background: var(--glass); border: 1px solid var(--border);
            padding: 40px; border-radius: 2px; width: 100%; max-width: 450px;
            backdrop-filter: blur(15px);
        }
        .title-large { font-family: 'Syncopate', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 10px; line-height: 1; }
        .title-line { width: 40px; height: 2px; background: var(--sanrita-accent); margin-bottom: 30px; }

        /* FORM ELEMENTS */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-bottom: 20px; }
        .tech-input {
            width: 100%; background: rgba(255,255,255,0.03); border: none; border-bottom: 1px solid var(--border);
            padding: 15px 5px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 16px;
            transition: 0.3s;
        }
        .tech-input:focus { border-color: var(--sanrita-accent); outline: none; background: rgba(255,255,255,0.05); }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; display: block; margin-top: 15px; }

        /* ACTION BUTTONS */
        .action-btn {
            width: 100%; background: var(--sanrita-accent); color: #000; border: none;
            padding: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px;
            margin-top: 30px; cursor: pointer; transition: 0.4s; clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 100%, 0 100%);
        }
        .action-btn:hover:not(:disabled) { background: #fff; transform: scale(1.02); }
        .action-btn:disabled { background: #222; color: #444; cursor: not-allowed; }

        /* HUD INDICATORS */
        .hud-status {
            position: absolute; top: 40px; right: 40px; background: var(--glass);
            border: 1px solid var(--border); padding: 12px 25px; border-radius: 40px;
            font-size: 11px; font-weight: 700; letter-spacing: 2px; z-index: 1000;
        }

        .pos-marker {
            position: absolute; bottom: 40px; left: 40px; border-left: 2px solid var(--sanrita-accent);
            padding-left: 20px; z-index: 1000;
        }

        @keyframes pageIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .danger-pulse { color: var(--danger); animation: dangerFlash 1.5s infinite; }
        @keyframes dangerFlash { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div class="hud-overlay"></div>

<div class="app-shell">
    <aside>
        <div class="brand-zone">
            <div class="brand-logo">NAVRAKHSHAK</div>
            <div class="brand-sub">Maritime Control System</div>
        </div>

        <nav class="nav-group">
            <button class="nav-btn active" onclick="showPage('mapPage', this)"><i class="fa-solid fa-earth-americas"></i> Map View</button>
            <button class="nav-btn" onclick="showPage('boundaryPage', this)"><i class="fa-solid fa-bullseye"></i> Zone Settings</button>
            <button class="nav-btn" id="sosNavBtn" onclick="acknowledgeSOS()"><i class="fa-solid fa-shield-heart"></i> Dispatch Rescue</button>
            <button class="nav-btn" onclick="showPage('adminPage', this)" style="margin-top: auto;"><i class="fa-solid fa-fingerprint"></i> Terminal Access</button>
        </nav>

        <div style="font-size: 9px; opacity: 0.3; line-height: 2;">
            EST. 2026<br>PROJECT NO. JIS-ECE-07<br>ENCRYPTED LORA PROTOCOL
        </div>
    </aside>

    <div class="viewport">
        <div id="map"></div>
        <div class="hud-status" id="statusBadge">LINK: ESTABLISHING...</div>

        <div class="pos-marker">
            <div style="font-size: 10px; opacity: 0.5; margin-bottom: 5px;">CURRENT POSITION (LAT/LON)</div>
            <div id="boatCoords" style="font-size: 20px; font-weight: 700; letter-spacing: -1px;">FETCHING TELEMETRY</div>
            <div id="syncClock" style="font-size: 10px; opacity: 0.5; margin-top: 5px;">SYNC: --:--:--</div>
        </div>

        <section id="boundaryPage" class="page">
            <div class="tech-panel">
                <div class="title-large">ZONE<br>PROTOCOL</div>
                <div class="title-line"></div>
                
                <div class="input-row">
                    <div><label>Center Lat</label><input type="number" id="cmdLat" class="tech-input" step="0.000001" placeholder="23.1316"></div>
                    <div><label>Center Lon</label><input type="number" id="cmdLon" class="tech-input" step="0.000001" placeholder="88.5473"></div>
                </div>
                <div class="input-row">
                    <div><label>Safe Radius (m)</label><input type="number" id="cmdRad" class="tech-input" placeholder="50"></div>
                    <div><label>Buffer Zone (m)</label><input type="number" id="cmdBuf" class="tech-input" placeholder="7"></div>
                </div>
                
                <button id="syncBtn" class="action-btn" onclick="updateGeofence()" disabled>SYNC COMMAND</button>
                <div id="lockStateMsg" style="font-size: 10px; margin-top: 20px; opacity: 0.4;">[ STANDBY: ENTER TERMINAL PIN TO UNLOCK ]</div>
            </div>
        </section>

        <section id="adminPage" class="page">
            <div class="tech-panel">
                <div class="title-large">ACCESS<br>TERMINAL</div>
                <div class="title-line"></div>
                
                <label>Encrypted Master Pin</label>
                <input type="password" id="adminPin" class="tech-input" placeholder="****" maxlength="4" oninput="checkAuth()">
                
                <div id="authStatusText" style="font-size: 12px; margin-top: 15px; font-weight: 700; color: var(--danger);">AUTH: DENIED</div>
                
                <button class="action-btn" style="background: white;" onclick="openSettingsModal()">RECONFIGURE KEY</button>
                <button class="action-btn" style="background: rgba(255,255,255,0.1); color: #fff; margin-top: 10px;" onclick="clearPath()">PURGE PATH LOGS</button>
            </div>
        </section>
    </div>
</div>

<div id="settingsModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9000; align-items:center; justify-content:center;">
    <div class="tech-panel" style="background: #111;">
        <h2 style="font-family:'Syncopate'; font-size:18px;">KEY UPDATE</h2>
        <label>Current Key</label><input type="password" id="oldPin" class="tech-input">
        <label>New 4-Digit Key</label><input type="password" id="newPin" class="tech-input" maxlength="4">
        <button class="action-btn" onclick="saveNewPin()">APPLY UPDATE</button>
        <button class="action-btn" style="background:none; color:#888;" onclick="closeSettings()">CANCEL</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const chID = "3300600", rKey = "M8RQ5ECSRWHF5ZRE", tbID = "56620", tbKey = "6H22BCX9X5LZ8II6";
    if (!localStorage.getItem('navPin')) localStorage.setItem('navPin', '1234');

    // Multi-Page Navigation
    function showPage(pID, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pID).classList.add('active');
        btn.classList.add('active');
        if(pID === 'mapPage') setTimeout(() => map.invalidateSize(), 300);
    }

    // Map Setup
    var map = L.map('map', {zoomControl: false}).setView([23.13161, 88.54735], 18);
    L.tileLayer('https://{s}.google.com/vt/lyrs=y,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    var boatPath = L.polyline([], {color: '#d4ff00', weight: 1, opacity: 0.5}).addTo(map);
    var boatIcon = L.circleMarker([0,0], { radius: 10, color: '#000', fillColor: '#d4ff00', fillOpacity: 1, weight: 5 }).addTo(map);
    var visualFence = L.circle([23.13161, 88.54735], { radius: 50, color: '#ff3e3e', weight: 1, fillOpacity: 0.05 }).addTo(map);

    // Live Telemetry Logic
    async function updateData() {
        try {
            const res = await fetch(`https://api.thingspeak.com/channels/${chID}/feeds.json?api_key=${rKey}&results=1`);
            const data = await res.json();
            const feed = data.feeds[0];
            if (feed) {
                const lat = parseFloat(feed.field1), lon = parseFloat(feed.field2), statusMsg = String(feed.field3 || "").toUpperCase();
                if (!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                    boatIcon.setLatLng([lat, lon]); boatPath.addLatLng([lat, lon]);
                    document.getElementById('boatCoords').innerText = `${lat.toFixed(6)} N / ${lon.toFixed(6)} E`;
                }
                document.getElementById('syncClock').innerText = `SYNC: ${new Date(feed.created_at).toLocaleTimeString()}`;
                
                let badge = document.getElementById('statusBadge'), sosBtn = document.getElementById('sosNavBtn');
                if (statusMsg.includes("SOS")) {
                    badge.innerText = "DISTRESS SIGNAL DETECTED"; badge.style.color = "red";
                    sosBtn.classList.add('danger-pulse');
                } else {
                    badge.innerText = "LINK: ENCRYPTED / SECURE"; badge.style.color = "#d4ff00";
                    sosBtn.classList.remove('danger-pulse');
                }
            }
        } catch (e) {}
    }

    // Security Logic
    function checkAuth() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        document.getElementById('syncBtn').disabled = !isAuth;
        document.getElementById('authStatusText').innerText = isAuth ? "AUTH: VERIFIED" : "AUTH: DENIED";
        document.getElementById('authStatusText').style.color = isAuth ? "#d4ff00" : "#ff3e3e";
        document.getElementById('lockStateMsg').innerText = isAuth ? "[ SYSTEM READY: ACCESS GRANTED ]" : "[ STANDBY: ENTER TERMINAL PIN TO UNLOCK ]";
    }

    async function updateGeofence() {
        const lat = document.getElementById('cmdLat').value, lon = document.getElementById('cmdLon').value, rad = document.getElementById('cmdRad').value, buf = document.getElementById('cmdBuf').value;
        const params = new URLSearchParams(); params.append('api_key', tbKey); params.append('command_string', `SET:${lat},${lon},${rad},${buf}`);
        await fetch(`https://api.thingspeak.com/talkbacks/${tbID}/commands.json`, { method: 'POST', body: params });
        visualFence.setLatLng([lat, lon]); visualFence.setRadius(parseFloat(rad));
        alert("GEOGRAPHIC COMMAND DISPATCHED.");
    }

    async function acknowledgeSOS() {
        const isAuth = document.getElementById('adminPin').value === localStorage.getItem('navPin');
        if(!isAuth) { showPage('adminPage', document.querySelector('.fa-fingerprint').parentElement); return alert("Terminal Authorization Required."); }
        const params = new URLSearchParams(); params.append('api_key', tbKey); params.append('command_string', "ACK_SOS");
        await fetch(`https://api.thingspeak.com/talkbacks/${tbID}/commands.json`, { method: 'POST', body: params });
        alert("BROADCAST SENT: RESCUE COORDINATED.");
    }

    function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveNewPin() {
        if(document.getElementById('oldPin').value === localStorage.getItem('navPin')) {
            localStorage.setItem('navPin', document.getElementById('newPin').value); alert("NEW SECURITY KEY STORED."); closeSettings();
        } else { alert("KEY MISMATCH."); }
    }
    function clearPath() { boatPath.setLatLngs([]); alert("MAP PURGED."); }

    setInterval(updateData, 15000); updateData();
</script>
</body>
</html>
